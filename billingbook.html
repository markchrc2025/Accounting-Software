                <div className="flex items-center gap-3">
                  <span className="text-sm font-semibold text-slate-700">HRIS Raw Data Batches</span>
                  <span className="text-xs text-slate-400">Check entries below to generate billing directly from payroll</span>
                </div>
                <div className="flex items-center gap-3">
                  {checkedHrisIds.size > 0 && (
                    <button
                      onClick={() => {
                        const hrisKey = (e) => e.CutoffStart + '|' + e.CutoffEnd;
                        const queue = hrisEntries.filter(e => checkedHrisIds.has(hrisKey(e)) && e.Status === 'New');
                        if (queue.length === 0) return;
                        setHrisProcessing(true);
                        setHrisError('');
                        let completed = 0;
                        let errors = [];

                        const processNext = (index) => {
                          if (index >= queue.length) {
                            setHrisProcessing(false);
                            if (errors.length > 0) setHrisError(errors.join(' | '));
                            if (onRefresh) onRefresh(() => {});
                            return;
                          }
                          const entry = queue[index];
                          google.script.run
                            .withSuccessHandler((resStr) => {
                              setCheckedHrisIds(prev => { const next = new Set(prev); next.delete(hrisKey(entry)); return next; });
                              setHrisEntries(prev => prev.map(e => hrisKey(e) === hrisKey(entry) ? { ...e, Status: 'Pulled' } : e));
                              completed++;
                              processNext(index + 1);
                            })
                            .withFailureHandler((err) => {
                              errors.push(entry.BatchId + ': ' + (err.message || 'Unknown error'));
                              processNext(index + 1);
                            })
                            .pullAndRegisterHrisFile(JSON.stringify({
                              batchId:       entry.BatchId,
                              companyName:   entry.CompanyName,
                              contactId:     client.contactId || client.id,
                              cutoffStart:   entry.CutoffStart,
                              cutoffEnd:     entry.CutoffEnd,
                              sourceFileUrl: entry.SourceFile
                            }));
                        };

                        processNext(0);
                      }}
                      disabled={hrisProcessing}
                      className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400 text-white text-sm font-bold rounded-md flex items-center gap-2 transition-colors shadow-sm"
                    >
                      {hrisProcessing
                        ? <><i className="fa-solid fa-spinner fa-spin"></i> Pulling…</>
                        : <><i className="fa-solid fa-bolt"></i> Generate Billing ({checkedHrisIds.size})</>}
                    </button>
                  )}
                  <button onClick={loadHrisData} disabled={hrisLoading} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-md border border-slate-200 bg-white hover:bg-slate-50 text-slate-600 transition-colors disabled:opacity-50 shadow-sm">
                    <i className={`fa-solid fa-rotate ${hrisLoading ? 'animate-spin' : ''}`}></i>
                    {hrisLoading ? 'Loading…' : 'Refresh'}
                  </button>
                </div>
              </div>
              {hrisError && <div className="mx-6 mt-3 px-4 py-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg">{hrisError}</div>}
              <div className="flex-1 overflow-auto">
                <table className="w-full text-left border-collapse min-w-[700px]">
                  <thead className="sticky top-0 bg-white shadow-sm z-10">
                    <tr className="text-slate-500 text-[11px] uppercase tracking-wider border-b border-slate-200">
                      <th className="px-4 py-3 font-semibold w-8"></th>
                      <th className="px-4 py-3 font-semibold">Batch ID</th>
                      <th className="px-4 py-3 font-semibold">Cutoff Period</th>
                      <th className="px-4 py-3 font-semibold">Upload Date</th>
                      <th className="px-4 py-3 font-semibold text-center">Employees</th>
                      <th className="px-4 py-3 font-semibold text-center">Status</th>
                      <th className="px-4 py-3 font-semibold">Source File</th>
                    </tr>
                  </thead>
                  <tbody className="text-sm">
                    {hrisLoading ? (
                      <tr><td colSpan="7" className="px-4 py-12 text-center text-slate-500"><i className="fa-solid fa-spinner fa-spin mr-2"></i>Loading HRIS data…</td></tr>
                    ) : hrisEntries.length === 0 ? (
                      <tr><td colSpan="7" className="px-4 py-12 text-center text-slate-500">No HRIS raw data found for <strong>{client.name}</strong>.</td></tr>
                    ) : hrisSlice.map((entry, idx) => {
                      const hrisRowKey = entry.CutoffStart + '|' + entry.CutoffEnd;
                      const isNew     = entry.Status === 'New';
                      const isChecked = checkedHrisIds.has(hrisRowKey);
                      return (
                        <tr key={idx} className={`border-b border-slate-100 transition-colors ${isChecked ? 'bg-emerald-50' : 'hover:bg-white'}`}>
                          <td className="px-4 py-3 text-center">
                            {isNew
                              ? <input type="checkbox" checked={isChecked} onChange={() => setCheckedHrisIds(prev => { const next = new Set(prev); isChecked ? next.delete(hrisRowKey) : next.add(hrisRowKey); return next; })} className="w-4 h-4 accent-emerald-600 cursor-pointer" />
                              : null}
                          </td>
                          <td className="px-4 py-3 font-mono text-xs text-slate-600">{entry.BatchId}</td>
                          <td className="px-4 py-3 text-slate-700">{entry.CutoffStart && entry.CutoffEnd ? new Date(entry.CutoffStart).toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'}) + ' – ' + new Date(entry.CutoffEnd).toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'}) : '—'}</td>
                          <td className="px-4 py-3 text-slate-500 text-xs whitespace-nowrap">{entry.UploadDate ? new Date(entry.UploadDate).toLocaleDateString() : '—'}</td>
                          <td className="px-4 py-3 text-center font-semibold text-slate-700">{entry.Employees || '—'}</td>
                          <td className="px-4 py-3 text-center">
                            {isNew
                              ? <span className="text-[10px] px-2 py-1 rounded-md font-bold uppercase bg-amber-100 text-amber-700">New</span>
                              : <span className="text-[10px] px-2 py-1 rounded-md font-bold uppercase bg-emerald-100 text-emerald-700">✓ Pulled</span>}
                          </td>
                          <td className="px-4 py-3">
                            {entry.SourceFile
                              ? <a href={entry.SourceFile} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline text-xs flex items-center gap-1"><i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>{entry.FileName || 'View'}</a>
                              : <span className="text-slate-400 text-xs">—</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <PaginationBar total={sortedHris.length} page={hrisPage} setPage={setHrisPage} pageSize={pageSize} onPageSizeChange={handlePageSizeChange} />
            </div>
            )}

            {emailDraftTxn && <EmailDraftModal txn={emailDraftTxn} client={client} parentCcEmail={parentCcEmail} onClose={() => setEmailDraftTxn(null)} />}
            {escalationTxn && <EscalationEmailModal txn={escalationTxn} client={client} parentCcEmail={parentCcEmail} onClose={() => setEscalationTxn(null)} />}
            {recordPaymentTxn && (
              <RecordPaymentModal
                triggerTxn={recordPaymentTxn}
                client={client}
                allTransactions={transactions}
                paymentsData={paymentsData}
                accountsData={accountsData}
                onClose={() => setRecordPaymentTxn(null)}
                onSaved={(updatedTxns) => {
                  setRecordPaymentTxn(null);
                  if (onPaymentRecorded) onPaymentRecorded(updatedTxns);
                }}
              />
            )}
            {statementReviewData && (
              <CreateBillingStatementModal
                reviewData={statementReviewData}
                onClose={() => setStatementReviewData(null)}
                onConfirmed={(result) => {
                  setStatementReviewData(null);
                  if (onTransactionCreated) onTransactionCreated(result);
                }}
              />
            )}
          </div>
        </div>
      );
    }

    // --- RECORD PAYMENT MODAL ---
    function RecordPaymentModal({ triggerTxn, client, allTransactions, paymentsData = [], accountsData = [], onClose, onSaved }) {
      const todayStr = new Date().toISOString().split('T')[0];
      const nextPaymentNo = (paymentsData.length + 1).toString();

      const [amountReceived, setAmountReceived] = useState('');
      const [bankCharges, setBankCharges] = useState('');
      const [paymentDate, setPaymentDate] = useState(todayStr);
      const [paymentNo, setPaymentNo] = useState(nextPaymentNo);
      const [paymentMode, setPaymentMode] = useState('Cash');
      const [depositTo, setDepositTo] = useState('');
      const [referenceNo, setReferenceNo] = useState('');
      const [taxDeducted, setTaxDeducted] = useState('none');
      const [notes, setNotes] = useState('');
      const [paymentInputs, setPaymentInputs] = useState({});
      const [paymentDateInputs, setPaymentDateInputs] = useState({});
      const [isSaving, setIsSaving] = useState(false);
      const [saveMode, setSaveMode] = useState('paid'); // 'draft' | 'paid'

      // Unpaid/Pending transactions for this client
      const unpaidTxns = useMemo(() =>
        allTransactions.filter(t => ['Unpaid', 'Pending'].includes(t.status)),
        [allTransactions]
      );

      // Pre-populate the trigger transaction's payment date and initialise input map
      useEffect(() => {
        const initDates = {};
        const initInputs = {};
        unpaidTxns.forEach(t => {
          initDates[t.id] = todayStr;
          initInputs[t.id] = '';
        });
        // Pre-fill trigger txn with 0 (user clicks Pay in Full or types)
        setPaymentDateInputs(initDates);
        setPaymentInputs(initInputs);
      }, []);

      // Cash/Bank accounts for Deposit To
      const bankAccounts = useMemo(() =>
        (accountsData || []).filter(a => {
          const t = String(a.type1 || '').toLowerCase();
          const n = String(a.accountName || '').toLowerCase();
          return t === 'cash and cash equivalents' || t === 'bank' || n.includes('cash') || n.includes('bank');
        }),
        [accountsData]
      );

      const fmt = (n) => Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      const totalApplied = useMemo(() =>
        Object.values(paymentInputs).reduce((s, v) => s + (parseFloat(v) || 0), 0),
        [paymentInputs]
      );
      const received = parseFloat(amountReceived) || 0;
      const amountInExcess = received - totalApplied;

      const setPayInFull = (txn) => {
        const due = Math.max(0, Number(txn.balance) || (Number(txn.total) - Number(txn.collected)));
        setPaymentInputs(prev => ({ ...prev, [txn.id]: due.toFixed(2) }));
      };

      const setReceivedFull = () => {
        const total = unpaidTxns.reduce((s, t) => s + Math.max(0, Number(t.balance) || (Number(t.total) - Number(t.collected))), 0);
        setAmountReceived(total.toFixed(2));
      };

      const handleSave = (mode) => {
        if (!paymentDate || !paymentNo) return;
        setIsSaving(true);
        setSaveMode(mode);

        const applications = unpaidTxns
          .filter(t => (parseFloat(paymentInputs[t.id]) || 0) > 0)
          .map(t => ({
            transactionId: t.id,
            amountApplied: parseFloat(paymentInputs[t.id]) || 0
          }));

        const payload = {
          bookId: client.id,
          contactId: client.contactId || client.id,
          contactName: client.name,
          paymentDate,
          paymentNo,
          amountReceived: received,
          bankCharges: parseFloat(bankCharges) || 0,
          paymentMode,
          depositTo,
          referenceNo,
          taxDeducted,
          notes,
          status: mode === 'draft' ? 'Draft' : 'Paid',
          applications
        };

        if (typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler((res) => {
              setIsSaving(false);
              const result = JSON.parse(res);
              if (onSaved) onSaved(result.updatedTransactions || []);
            })
            .withFailureHandler((err) => {
              setIsSaving(false);
              alert('Failed to save payment: ' + (err.message || 'Unknown error'));
            })
            .recordPayment(JSON.stringify(payload));
        } else {
          // Dev fallback
          setIsSaving(false);
          if (onSaved) onSaved([]);
        }
      };

      const fullOutstanding = unpaidTxns.reduce((s, t) =>
        s + Math.max(0, Number(t.balance) || (Number(t.total) - Number(t.collected))), 0
      );

      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-start justify-center z-50 p-4 pt-6 overflow-y-auto animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col mb-8">
            {/* Header */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-200">
              <h2 className="text-lg font-bold text-slate-800">Record Payment</h2>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center hover:bg-slate-100 rounded-full text-slate-400 transition-colors">
                <i className="fa-solid fa-xmark text-lg"></i>
              </button>
            </div>

            <div className="p-6 space-y-6">
              {/* Top form fields — 2 column grid */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                {/* Customer Name */}
                <div>
                  <label className="block text-sm font-semibold text-red-600 mb-1.5">Customer Name<span className="text-red-500">*</span></label>
                  <div className="px-3 py-2 border border-slate-200 rounded-md bg-slate-50 text-slate-700 font-medium text-sm">{client.name}</div>
                </div>

                {/* Location */}
                <div>
                  <label className="block text-sm font-semibold text-slate-600 mb-1.5">Location</label>
                  <input type="text" defaultValue="Head Office" className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>

                {/* Amount Received */}
                <div>
                  <label className="block text-sm font-semibold text-red-600 mb-1.5">Amount Received<span className="text-red-500">*</span></label>
                  <div className="flex items-center gap-2">
                    <div className="relative flex-1">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 font-medium text-sm">PHP</span>
                      <input
                        type="number"
                        min="0"
                        step="0.01"
                        value={amountReceived}
                        onChange={e => setAmountReceived(e.target.value)}
                        className="w-full pl-14 pr-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                        placeholder="0.00"
                      />
                    </div>
                  </div>
                  <label className="flex items-center gap-2 mt-1.5 cursor-pointer">
                    <input type="checkbox" onChange={setReceivedFull} className="w-3.5 h-3.5 accent-blue-600" />
                    <span className="text-xs text-slate-500">Received full amount ({formatCurrency(fullOutstanding)})</span>
                  </label>
                </div>

                {/* Bank Charges */}
                <div>
                  <label className="block text-sm font-semibold text-slate-600 mb-1.5">Bank Charges (if any)</label>
                  <input
                    type="number"
                    min="0"
                    step="0.01"
                    value={bankCharges}
                    onChange={e => setBankCharges(e.target.value)}
                    placeholder="0.00"
                    className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                  />
                </div>

                {/* Payment Date */}
                <div>
                  <label className="block text-sm font-semibold text-red-600 mb-1.5">Payment Date<span className="text-red-500">*</span></label>
                  <input
                    type="date"
                    value={paymentDate}
                    onChange={e => setPaymentDate(e.target.value)}
                    className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                  />
                </div>

                {/* Payment # */}
                <div>
                  <label className="block text-sm font-semibold text-red-600 mb-1.5">Payment #<span className="text-red-500">*</span></label>
                  <div className="flex items-center gap-2">
                    <input
                      type="text"
                      value={paymentNo}
                      onChange={e => setPaymentNo(e.target.value)}
                      className="flex-1 px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                    />
                    <button
                      onClick={() => setPaymentNo(nextPaymentNo)}
                      title="Reset to auto-number"
                      className="w-9 h-9 flex items-center justify-center border border-slate-300 rounded-md hover:bg-slate-50 text-slate-400 transition-colors"
                    >
                      <i className="fa-solid fa-gear text-sm"></i>
                    </button>
                  </div>
                </div>

                {/* Payment Mode */}
                <div>
                  <label className="block text-sm font-semibold text-slate-600 mb-1.5">Payment Mode</label>
                  <select
                    value={paymentMode}
                    onChange={e => setPaymentMode(e.target.value)}
                    className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                  >
                    <option>Cash</option>
                    <option>Check</option>
                    <option>Bank Transfer</option>
                    <option>Online</option>
                    <option>Others</option>
                  </select>
                </div>

                {/* Deposit To */}
                <div>
                  <label className="block text-sm font-semibold text-red-600 mb-1.5">Deposit To<span className="text-red-500">*</span></label>
                  <select
                    value={depositTo}
                    onChange={e => setDepositTo(e.target.value)}
                    className={`w-full px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white ${!depositTo ? 'border-amber-300 bg-amber-50' : 'border-slate-300'}`}
                  >
                    <option value="">— Select account —</option>
                    {bankAccounts.length > 0
                      ? bankAccounts.map(a => {
                          const lbl = a.accountCode ? `[ ${a.accountCode} ] ${a.accountName}` : a.accountName;
                          return <option key={lbl} value={lbl}>{lbl}</option>;
                        })
                      : <option value="Cash in Bank - UB Checking">[ 1008928 ] Cash in Bank - UB Checking</option>
                    }
                  </select>
                </div>

                {/* Reference # */}
                <div>
                  <label className="block text-sm font-semibold text-slate-600 mb-1.5">Reference #</label>
                  <input
                    type="text"
                    value={referenceNo}
                    onChange={e => setReferenceNo(e.target.value)}
                    className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                  />
                </div>

                {/* Tax Deducted */}
                <div>
                  <label className="block text-sm font-semibold text-slate-600 mb-2">Tax deducted?</label>
                  <div className="flex items-center gap-6">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input type="radio" name="taxDeducted" value="none" checked={taxDeducted === 'none'} onChange={() => setTaxDeducted('none')} className="accent-blue-600" />
                      <span className="text-sm text-slate-700">No Tax deducted</span>
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input type="radio" name="taxDeducted" value="ewt" checked={taxDeducted === 'ewt'} onChange={() => setTaxDeducted('ewt')} className="accent-blue-600" />
                      <span className="text-sm text-slate-700">Yes, TDS</span>
                    </label>
                  </div>
                </div>
              </div>

              {/* Unpaid Invoices Table */}
              <div>
                <div className="flex items-center justify-between mb-3">
                  <h3 className="text-sm font-bold text-slate-700">Unpaid Invoices</h3>
                  <span className="text-xs text-slate-400">**List contains only unpaid / pending invoices</span>
                </div>
                {unpaidTxns.length === 0 ? (
                  <div className="border border-slate-200 rounded-lg px-4 py-8 text-center text-sm text-slate-400">
                    No unpaid invoices for this client.
                  </div>
                ) : (
                  <div className="border border-slate-200 rounded-lg overflow-hidden">
                    <table className="w-full text-left border-collapse min-w-[700px]">
                      <thead>
                        <tr className="bg-slate-50 text-[11px] uppercase tracking-wider text-slate-500 border-b border-slate-200">
                          <th className="px-4 py-2.5 font-semibold">Date</th>
                          <th className="px-4 py-2.5 font-semibold">Invoice Number</th>
                          <th className="px-4 py-2.5 font-semibold">Period / Details</th>
                          <th className="px-4 py-2.5 font-semibold text-right">Invoice Amount</th>
                          <th className="px-4 py-2.5 font-semibold text-right">Amount Due</th>
                          <th className="px-4 py-2.5 font-semibold text-center">Payment Received On</th>
                          <th className="px-4 py-2.5 font-semibold text-right">Payment</th>
                        </tr>
                      </thead>
                      <tbody className="text-sm">
                        {unpaidTxns.map(txn => {
                          const amountDue = Math.max(0, Number(txn.balance) || (Number(txn.total) - Number(txn.collected)));
                          const isTarget = txn.id === triggerTxn.id;
                          return (
                            <tr key={txn.id} className={`border-b border-slate-100 ${isTarget ? 'bg-emerald-50/40' : 'hover:bg-slate-50'} transition-colors`}>
                              <td className="px-4 py-3 text-slate-600 whitespace-nowrap">
                                <div>{txn.date ? new Date(txn.date).toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' }) : '—'}</div>
                                {txn.date && <div className="text-xs text-slate-400">Due Date: {new Date(new Date(txn.date).getTime() + 30 * 86400000).toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' })}</div>}
                              </td>
                              <td className="px-4 py-3 font-medium text-blue-600">{txn.id}</td>
                              <td className="px-4 py-3">
                                <div className="text-slate-700">{txn.type || 'billing'}</div>
                                <div className="text-xs text-slate-400">{txn.period}</div>
                              </td>
                              <td className="px-4 py-3 text-right font-medium text-slate-700">{formatCurrency(txn.total)}</td>
                              <td className="px-4 py-3 text-right font-medium text-slate-700">{formatCurrency(amountDue)}</td>
                              <td className="px-4 py-3 text-center">
                                <input
                                  type="date"
                                  value={paymentDateInputs[txn.id] || todayStr}
                                  onChange={e => setPaymentDateInputs(prev => ({ ...prev, [txn.id]: e.target.value }))}
                                  className="px-2 py-1 border border-slate-200 rounded-md text-xs focus:ring-2 focus:ring-blue-300 outline-none"
                                />
                              </td>
                              <td className="px-4 py-3 text-right">
                                <input
                                  type="number"
                                  min="0"
                                  step="0.01"
                                  value={paymentInputs[txn.id] ?? ''}
                                  onChange={e => setPaymentInputs(prev => ({ ...prev, [txn.id]: e.target.value }))}
                                  placeholder="0"
                                  className="w-28 px-2 py-1 border border-slate-200 rounded-md text-xs text-right focus:ring-2 focus:ring-blue-300 outline-none"
                                />
                                <button
                                  onClick={() => setPayInFull(txn)}
                                  className="block text-[10px] text-blue-600 hover:underline mt-0.5 ml-auto"
                                >
                                  Pay in Full
                                </button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

              {/* Summary block */}
              <div className="flex justify-end">
                <div className="w-72 border border-slate-200 rounded-xl overflow-hidden text-sm">
                  <div className="flex justify-between px-4 py-2.5 border-b border-slate-100">
                    <span className="text-slate-500">Total</span>
                    <span className="font-semibold text-slate-700">{fmt(totalApplied)}</span>
                  </div>
                  <div className="flex justify-between px-4 py-2.5 border-b border-slate-100">
                    <span className="text-slate-500">Amount Received :</span>
                    <span className="font-semibold text-slate-700">{fmt(received)}</span>
                  </div>

    // --- PHASE 2: UPLOAD RAW FILE MODAL ---
    function UploadBillingBatchModal({ client, onClose, onComplete }) {
      const [formData, setFormData] = useState({
        periodStart: '',
        periodEnd: '',
        billingDate: new Date().toISOString().split('T')[0],
        file: null,
        base64: '',
        fileName: '',
        mimeType: ''
      });
      const [isUploading, setIsUploading] = useState(false);
      const [isDetectingPeriod, setIsDetectingPeriod] = useState(false);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Auto-fill dates if filename matches YYYY-MM-DD_YYYY-MM-DD
        const dateRegex = /(\d{4}-\d{2}-\d{2})_(\d{4}-\d{2}-\d{2})/;
        const match = file.name.match(dateRegex);
        const dateDetectedFromFilename = !!match;
        let newStart = match ? match[1] : '';
        let newEnd = match ? match[2] : '';

        const reader = new FileReader();
        reader.onload = (event) => {
          const base64String = event.target.result.split(',')[1];
          setFormData(prev => ({ 
            ...prev, file, base64: base64String, fileName: file.name, mimeType: file.type,
            periodStart: newStart, periodEnd: newEnd
          }));
          // AI: Smart period detection for CSV files when filename didn't reveal dates
          if (!dateDetectedFromFilename && (file.type === 'text/csv' || file.name.toLowerCase().endsWith('.csv'))) {
            setIsDetectingPeriod(true);
            try {
              const text = decodeURIComponent(escape(atob(base64String)));
              const firstLines = text.split('\n').slice(0, 6).join('\n');
              const prompt = `Look at these first rows from a billing CSV and determine the billing period covered. Return ONLY a JSON object like {"start":"YYYY-MM-DD","end":"YYYY-MM-DD"} or {} if you cannot determine it. No explanation.\n\nCSV rows:\n${firstLines}`;
              generateTextWithGemini(prompt, 'You are a data analyst. Return only valid JSON, no commentary.').then(result => {
                try {
                  const cleaned = result.replace(/```json|```/g, '').trim();
                  const parsed = JSON.parse(cleaned);
                  if (parsed.start && parsed.end) {
                    setFormData(prev => ({ ...prev, periodStart: parsed.start, periodEnd: parsed.end }));
                  }
                } catch (e) { /* ignore if AI couldn't determine */ }
                setIsDetectingPeriod(false);
              });
            } catch (e) { setIsDetectingPeriod(false); }
          }
        };
        reader.readAsDataURL(file);
      };

      const handleUpload = () => {
        setIsUploading(true);
        const payload = {
          contactId: client.contactId || client.id,
          contactName: client.name,
          fileName: formData.fileName,
          mimeType: formData.mimeType,
          bytesBase64: formData.base64,
          period: (formData.periodStart && formData.periodEnd) ? `${formData.periodStart} to ${formData.periodEnd}` : 'Unspecified',
          date: formData.billingDate
        };

        google.script.run.withSuccessHandler((responseStr) => {
          setIsUploading(false);
          const response = JSON.parse(responseStr);
          onComplete(response); // Update local state so UI updates
        }).withFailureHandler((err) => {
          console.error(err);
          alert("Upload failed. Please check console.");
          setIsUploading(false);
        }).uploadRawBillingFile(JSON.stringify(payload));
      };

      return (
        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
          <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-[slideUp_0.3s_ease-out]">
            <div className="px-6 py-4 bg-slate-800 text-white flex justify-between items-center">
              <div><h2 className="text-lg font-bold">Upload Billing Batch</h2><p className="text-xs text-slate-300">Archive raw files to Drive</p></div>
              <button onClick={onClose} disabled={isUploading} className="w-8 h-8 flex items-center justify-center hover:bg-slate-700 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <div className="p-6 space-y-4">
              <div className="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center hover:bg-slate-50 transition-colors">
                 <input type="file" id="fileUpload" className="hidden" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" onChange={handleFileChange} />
                 <label htmlFor="fileUpload" className="cursor-pointer flex flex-col items-center justify-center gap-2">
                    <i className="fa-solid fa-cloud-arrow-up text-4xl text-blue-500"></i>
                    <span className="text-sm font-bold text-slate-700">{formData.fileName ? formData.fileName : "Click to select Raw File (.csv, .xlsx)"}</span>
                 </label>
              </div>

              {formData.file && (
                <div className="animate-[fadeIn_0.3s_ease-out] space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Billing Date</label>
                    <input type="date" value={formData.billingDate} onChange={e => setFormData({...formData, billingDate: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs font-bold text-slate-600 mb-1.5 uppercase flex items-center gap-1.5">
                        Period Start
                        {isDetectingPeriod && <i className="fa-solid fa-spinner fa-spin text-purple-400 text-[10px]" title="✨ AI detecting period..."></i>}
                        {!isDetectingPeriod && formData.periodStart && <span className="text-[9px] text-purple-500 font-normal normal-case">✨ detected</span>}
                      </label>
                      <input type="date" value={formData.periodStart} onChange={e => setFormData({...formData, periodStart: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Period End</label>
                      <input type="date" value={formData.periodEnd} onChange={e => setFormData({...formData, periodEnd: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                    </div>
                  </div>
                </div>
              )}
            </div>

            <div className="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3">
              <button onClick={onClose} disabled={isUploading} className="px-4 py-2 font-semibold text-slate-600 hover:bg-slate-200 rounded-md transition-colors text-sm">Cancel</button>
              <button 
                onClick={handleUpload}
                disabled={!formData.file || isUploading}
                className="px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-bold rounded-md shadow-sm transition-colors text-sm flex items-center gap-2"
              >
                {isUploading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-upload"></i>} 
                {isUploading ? "Uploading to Drive..." : "Upload & Archive"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- PHASE 3: PROCESS BILLING FILE MODAL ---
    function ProcessBillingModal({ client, upload, taxGroups = [], taxRates = [], contacts = [], parameterTemplates = [], transformConfigs = {}, onTemplateAdded, onTemplateDeleted, onClose, onComplete }) {
      const [serviceFeeRate, setServiceFeeRate] = useState(
        client?.serviceFee !== '' && client?.serviceFee !== undefined ? String(client.serviceFee) : ''
      );
      const [billingDate, setBillingDate] = useState(new Date().toISOString().split('T')[0]);
      const [thirteenthBasis, setThirteenthBasis] = useState('regular');
      const [transformParams, setTransformParams] = useState({
        Computation: {
          extraColumns:           [],
          separatedPer:           'work location',
          subtotalPer:            'N/A',
          summarizeBottom:        true,
          createGrandComputation: false
        },
        SummarySheet: {
          createSummary:      true,
          summarizePer:       'per_computation',
          createGrandSummary: false
        }
      });
      // transformMethod is derived from params — regional whenever anything non-trivial is configured
      const transformMethod = React.useMemo(() => {
        const c = transformParams.Computation;
        const s = transformParams.SummarySheet;
        if (c.separatedPer !== 'N/A' || c.subtotalPer !== 'N/A' || c.summarizeBottom || c.createGrandComputation || s.createSummary || s.createGrandSummary) return 'regional';
        return 'default';
      }, [transformParams]);
      const setTP = (section, key, value) => {
        setActiveTemplateKey('');
        setTransformParams(prev => ({ ...prev, [section]: { ...prev[section], [key]: value } }));
      };
      const toggleExtraColumn = (colName) => {
        setActiveTemplateKey('');
        setTransformParams(prev => {
          const cur = prev.Computation.extraColumns || [];
          const next = cur.includes(colName) ? cur.filter(c => c !== colName) : [...cur, colName];
          return { ...prev, Computation: { ...prev.Computation, extraColumns: next.slice(0, 2) } };
        });
      };

      const PARAM_TEMPLATES = {
        regional: { label: 'Regional', method: 'regional',
          Computation: { extraColumns: [], separatedPer: 'N/A', subtotalPer: 'work region', summarizeBottom: true },
          SummarySheet: { createSummary: true,  summarizePer: 'per_computation', createGrandSummary: false } },
        default:  { label: 'Default',  method: 'default',
          Computation: { extraColumns: [], separatedPer: 'N/A',          subtotalPer: 'N/A', summarizeBottom: false },
          SummarySheet: { createSummary: false, summarizePer: 'per_computation', createGrandSummary: false } }
      };

      // On mount: start with No Preset selected so the user picks explicitly.
      React.useEffect(() => {
        setActiveTemplateKey('');
      }, []);

      const [showSaveTpl,  setShowSaveTpl]  = useState(false);
      const [newTplName,   setNewTplName]   = useState('');
      const [isSavingTpl,  setIsSavingTpl]  = useState(false);
      const [isDeletingTpl, setIsDeletingTpl] = useState(false);

      const applyTemplate = (key) => {
        setActiveTemplateKey(key);
        if (!key) return; // No Preset — keep current params, let user edit freely
        const builtIn = PARAM_TEMPLATES[key];
        if (builtIn) { setTransformParams({ Computation: { ...builtIn.Computation }, SummarySheet: { ...builtIn.SummarySheet } }); return; }
        const custom = parameterTemplates.find(t => t.key === key);
        if (custom) { setTransformParams({ Computation: { ...custom.Computation }, SummarySheet: { ...custom.SummarySheet } }); }
      };

      const saveCustomTemplate = () => {
        const name = newTplName.trim();
        if (!name || typeof google === 'undefined') return;
        setIsSavingTpl(true);
        google.script.run
          .withSuccessHandler(resStr => {
            const tpl = JSON.parse(resStr);
            if (onTemplateAdded) onTemplateAdded(tpl);
            setIsSavingTpl(false);
            setShowSaveTpl(false);
            setNewTplName('');
          })
          .withFailureHandler(err => {
            setIsSavingTpl(false);
            alert('Failed to save template: ' + (err.message || 'Unknown error'));
          })
          .saveParameterTemplate(JSON.stringify({
            label: name, method: transformMethod,
            Computation: transformParams.Computation,
            SummarySheet: transformParams.SummarySheet
          }));
      };

      const deleteCustomTemplate = (key) => {
        if (typeof google === 'undefined') return;
        setIsDeletingTpl(true);
        google.script.run
          .withSuccessHandler(() => {
            if (onTemplateDeleted) onTemplateDeleted(key);
            setIsDeletingTpl(false);
          })
          .withFailureHandler(err => {
            setIsDeletingTpl(false);
            alert('Failed to delete template: ' + (err.message || 'Unknown error'));
          })
          .deleteParameterTemplate(key);
      };

      const [activeTemplateKey, setActiveTemplateKey] = useState('');

      // Derive default TaxGroup from contacts record for this client
      const defaultTaxGroup = React.useMemo(() => {
        if (!client) return '';
        const contact = contacts.find(c => String(c.ContactID || c.id || '') === String(client.contactId || client.id || ''));
        return (contact && (contact.TaxGroup || contact.taxGroup)) ? String(contact.TaxGroup || contact.taxGroup) : '';
      }, [client, contacts]);

      const [taxGroupName, setTaxGroupName] = useState(defaultTaxGroup);
      const [taxMode, setTaxMode]           = useState(defaultTaxGroup ? 'group' : 'rates');
      const [selectedRateNames, setSelectedRateNames] = useState([]);

      const toggleRate = (name) => setSelectedRateNames(prev =>
        prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]
      );

      // What gets sent to the backend: group name OR comma-sep rate names
      const effectiveTaxGroupName = taxMode === 'group'
        ? taxGroupName
        : selectedRateNames.join(',');

      // Derived: rate details for the selected tax group (preview)
      const selectedGroupRates = React.useMemo(() => {
        if (taxMode !== 'group' || !taxGroupName) return [];
        const group = taxGroups.find(g => g.name === taxGroupName);
        if (!group) return [];
        const names = (group.rateNames || '').split(',').map(r => r.trim()).filter(Boolean);
        return names.map(n => taxRates.find(r => r.name === n)).filter(Boolean);
      }, [taxMode, taxGroupName, taxGroups, taxRates]);
      const [phase, setPhase] = useState('form'); // 'form' | 'reviewing' | 'done'
      const [draftData, setDraftData] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [isFinalizing, setIsFinalizing] = useState(false);
      const [error, setError] = useState('');
      const [narrative, setNarrative] = useState(null);
      const [isNarrating, setIsNarrating] = useState(false);

      const gt           = draftData ? Number(draftData.GrandTotal) : 0;
      const vatAmt       = gt * 0.12;
      const totalWithVat = gt + vatAmt;
      const ewtAmt       = gt * 0.02;
      const netPayable   = totalWithVat - ewtAmt;
      const fmt = (n) => Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      // Whether we're in the large-sheet review mode
      const isSheetReview = phase === 'reviewing' && draftData?.WorksheetEmbedUrl;

      const handleDraft = () => {
        const rate = parseFloat(serviceFeeRate);
        if (isNaN(rate) || rate < 0 || rate > 1) {
          setError('Please enter a valid rate between 0 and 1 (e.g. 0.15 for 15%).');
          return;
        }
        const cp = transformParams.Computation;
        if (cp.separatedPer !== 'N/A' && cp.subtotalPer !== 'N/A' && cp.separatedPer === cp.subtotalPer) {
          setError("'Separate per' and 'Subtotal per' cannot use the same column.");
          return;
        }
        setIsProcessing(true);
        setError('');
        google.script.run
          .withSuccessHandler((responseStr) => {
            setIsProcessing(false);
            setDraftData(JSON.parse(responseStr));
            setPhase('reviewing');
          })
          .withFailureHandler((err) => {
            setIsProcessing(false);
            setError('Processing failed: ' + (err.message || 'Unknown error'));
          })
          .draftBillingComputation(JSON.stringify({
            uploadId:        upload.UploadId,
            serviceFeeRate:  rate,
            billingDate:     billingDate,
            transformMethod: transformMethod,
            taxGroupName:    effectiveTaxGroupName,
            thirteenthBasis: thirteenthBasis,
            transformParams: transformParams
          }));
      };

      const handleFinalize = () => {
        setIsFinalizing(true);
        setError('');
        google.script.run
          .withSuccessHandler((responseStr) => {
            setIsFinalizing(false);
            const record = JSON.parse(responseStr);
            onComplete(record);
            setPhase('done');
            setIsNarrating(true);
            const prompt = `Summarize this billing computation result for a CFO in 2-3 concise professional sentences. Highlight the key numbers. Client: ${record.ContactName}, Period: ${record.BillingPeriod}, Rows Processed: ${record.RowCount}, Service Fee Rate: ${(record.ServiceFeeRate * 100).toFixed(1)}%, Computed Billing Amount: ₱${Number(record.GrandTotal).toLocaleString('en-PH', {minimumFractionDigits: 2})}.`;
            generateTextWithGemini(prompt, 'You are a CFO assistant. Write concise financial summaries.').then(result => {
              setNarrative(result);
              setIsNarrating(false);
            });
          })
          .withFailureHandler((err) => {
            setIsFinalizing(false);
            setError('Finalization failed: ' + (err.message || 'Unknown error'));
          })
          .finalizeBillingComputation(JSON.stringify({
            computationId:   draftData.ComputationId,
            uploadId:        draftData.UploadId,
            grandTotal:      draftData.GrandTotal,
            rowCount:        draftData.RowCount,
            serviceFeeRate:  draftData.ServiceFeeRate,
            taxGroupName:    draftData.TaxGroupName || taxGroupName,
            transformMethod: draftData.TransformMethod,
            worksheetUrl:    draftData.WorksheetUrl || ''
          }));
      };

      const headerBg    = phase === 'reviewing' ? 'bg-amber-600' : phase === 'done' ? 'bg-emerald-700' : 'bg-blue-700';
      const headerSub   = phase === 'reviewing' ? 'text-amber-200' : phase === 'done' ? 'text-emerald-200' : 'text-blue-200';
      const headerLabel = phase === 'reviewing' ? 'Review Billing Computation' : phase === 'done' ? 'Billing Finalized' : 'Process Billing File';

      return (
        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
          <div className={`bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-[slideUp_0.3s_ease-out] transition-all duration-300 ${
            isSheetReview ? 'w-full max-w-[96vw] h-[92vh]' : phase === 'done' ? 'w-full max-w-md max-h-[90vh]' : 'w-full max-w-2xl max-h-[90vh]'
          }`}>

            {/* Header */}
            <div className={`px-6 py-4 ${headerBg} text-white flex justify-between items-center shrink-0`}>
              <div className="flex items-center gap-4">
                <div>
                  <h2 className="text-lg font-bold">{headerLabel}</h2>
                  <p className={`text-xs ${headerSub}`}>Client: {client?.name}{draftData ? ` · ${draftData.BillingPeriod} · ${draftData.TransformMethod?.toUpperCase()} transform` : ''}</p>
                </div>
                {isSheetReview && draftData.WorksheetUrl && (
                  <a href={draftData.WorksheetUrl} target="_blank" rel="noopener noreferrer"
                    className="ml-2 px-3 py-1.5 bg-white/20 hover:bg-white/30 text-white text-xs font-semibold rounded-md flex items-center gap-1.5 transition-colors">
                    <i className="fa-solid fa-arrow-up-right-from-square text-xs"></i> Open in Drive
                  </a>
                )}
              </div>
              <button onClick={onClose} disabled={isProcessing || isFinalizing} className="w-8 h-8 flex items-center justify-center hover:bg-white/20 rounded-full transition-colors shrink-0">
                <i className="fa-solid fa-xmark text-lg"></i>
              </button>
            </div>

            {/* Body */}
            {isSheetReview ? (
              // ── LARGE FULLSCREEN LAYOUT: iframe + sidebar ──────────────
              <div className="flex flex-1 overflow-hidden">
                {/* Sidebar: numbers summary */}
                <div className="w-64 shrink-0 border-r border-slate-200 bg-slate-50 flex flex-col overflow-y-auto">
                  <div className="p-4 space-y-3">
                    <p className="text-[10px] font-bold uppercase tracking-wider text-amber-600 flex items-center gap-1.5">
                      <i className="fa-solid fa-magnifying-glass"></i> Review before finalizing
                    </p>
                    <div className="bg-white border border-slate-200 rounded-lg p-3 text-xs space-y-2">
                      <div className="flex justify-between pb-2 border-b border-slate-100">
                        <span className="text-slate-500">Employees:</span>
                        <span className="font-bold text-slate-800">{draftData.RowCount}</span>
                      </div>
                      <div className="flex justify-between"><span className="text-slate-500">Services Rendered:</span><span className="font-semibold text-slate-700">₱{fmt(gt)}</span></div>
                      <div className="flex justify-between"><span className="text-slate-500">VAT (12%):</span><span className="font-semibold text-slate-700">₱{fmt(vatAmt)}</span></div>
                      <div className="flex justify-between"><span className="text-slate-500">Total w/ VAT:</span><span className="font-semibold text-slate-700">₱{fmt(totalWithVat)}</span></div>
                      <div className="flex justify-between"><span className="text-slate-500">EWT (2%):</span><span className="font-semibold text-red-600">-₱{fmt(ewtAmt)}</span></div>
                      <div className="flex justify-between pt-2 border-t border-slate-200">
                        <span className="font-bold text-slate-700">Net Payable:</span>
                        <span className="font-bold text-emerald-700">₱{fmt(netPayable)}</span>
                      </div>
                    </div>
                    <p className="text-[10px] text-slate-400 leading-relaxed">Scroll through the computation on the right. Click "Finalize &amp; Save" when satisfied, or "Reprocess" to re-run.</p>
                  </div>
                  {error && <p className="mx-4 text-xs text-red-600 font-medium bg-red-50 border border-red-200 rounded p-2">{error}</p>}
                </div>
                {/* Main: embedded Google Sheet */}
                <iframe
                  src={draftData.WorksheetEmbedUrl}
                  className="flex-1 border-none"
                  title="Billing Computation"
                />
              </div>
            ) : (
              // ── NORMAL SMALL LAYOUT ─────────────────────────────────────
              <div className="flex-1 p-6 space-y-4 overflow-y-auto min-h-0">

                {/* PHASE: form */}
                {phase === 'form' && <>
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 text-sm space-y-2">
                    <div className="flex justify-between"><span className="text-slate-500">File:</span><span className="font-medium text-slate-800 truncate max-w-[60%]">{upload?.FileName}</span></div>
                    <div className="flex justify-between"><span className="text-slate-500">Period:</span><span className="font-medium text-slate-800">{upload?.BillingPeriod}</span></div>
                    <div className="flex justify-between items-center">
                      <span className="text-slate-500">Service Fee:</span>
                      <span className="font-bold text-blue-700">
                        {serviceFeeRate !== '' ? `${(parseFloat(serviceFeeRate) * 100).toFixed(1)}%` : <span className="text-red-500 font-normal text-xs">Not set</span>}
                      </span>
                    </div>
                    <div className="flex justify-between items-center pt-1 border-t border-slate-200">
                      <span className="text-slate-500">Billing Date:</span>
                      <input
                        type="date"
                        value={billingDate}
                        onChange={e => setBillingDate(e.target.value)}
                        className="text-sm font-medium text-slate-800 border border-slate-300 rounded-md px-2 py-0.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                      />
                    </div>
                  </div>
                  {serviceFeeRate === '' && (
                    <div>
                      <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Service Fee Rate <span className="text-red-500">(enter manually)</span></label>
                      <input type="number" step="0.001" min="0" max="1" value={serviceFeeRate} onChange={e => setServiceFeeRate(e.target.value)} placeholder="e.g. 0.15 for 15%" className="w-full px-3 py-2 border border-red-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                    </div>
                  )}
                  {/* Tax Settings */}
                  <div className="border border-slate-200 rounded-lg p-3 space-y-3">
                    <div className="flex items-center justify-between">
                      <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500"><i className="fa-solid fa-percent mr-1"></i>Tax Settings</p>
                      {/* Mode toggle */}
                      <div className="flex text-[10px] font-bold rounded-md overflow-hidden border border-slate-300">
                        <button
                          onClick={() => setTaxMode('group')}
                          className={`px-2.5 py-1 transition-colors ${taxMode === 'group' ? 'bg-blue-600 text-white' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                        >By Group</button>
                        <button
                          onClick={() => setTaxMode('rates')}
                          className={`px-2.5 py-1 border-l border-slate-300 transition-colors ${taxMode === 'rates' ? 'bg-blue-600 text-white' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                        >By Rate</button>
                      </div>
                    </div>

                    {taxMode === 'group' && (
                      <div>
                        <label className="block text-xs font-semibold text-slate-600 mb-1">Tax Group</label>
                        <select
                          value={taxGroupName}
                          onChange={e => setTaxGroupName(e.target.value)}
                          className={`w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white ${
                            !taxGroupName ? 'border-amber-300 bg-amber-50' : 'border-slate-300'
                          }`}
                        >
                          <option value="">— None / not set —</option>
                          {taxGroups.map(g => (
                            <option key={g.name} value={g.name}>{g.name}</option>
                          ))}
                        </select>
                        {!taxGroupName && (
                          <p className="text-[10px] text-amber-600 mt-1"><i className="fa-solid fa-triangle-exclamation mr-1"></i>No group selected. Will fall back to default 12% VAT + 2% EWT.</p>
                        )}
                        {selectedGroupRates.length > 0 && (
                          <div className="mt-2 space-y-1">
                            {selectedGroupRates.map(r => (
                              <div key={r.name} className="flex items-center justify-between text-xs">
                                <span className={`font-medium ${r.rate < 0 ? 'text-amber-700' : 'text-blue-700'}`}>{r.name}</span>
                                <span className="font-mono text-slate-500">{r.rate > 0 ? '+' : ''}{r.rate}% &rarr; {r.taxAccount || '—'}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}

                    {taxMode === 'rates' && (
                      <div className="space-y-1.5">
                        <p className="text-[10px] text-slate-400">Select one or more individual tax rates to apply:</p>
                        {taxRates.length === 0 && (
                          <p className="text-xs text-amber-600"><i className="fa-solid fa-triangle-exclamation mr-1"></i>No active tax rates found in Central Settings.</p>
                        )}
                        {taxRates.map(r => (
                          <label key={r.name} className={`flex items-center justify-between gap-2 px-3 py-2 rounded-md border cursor-pointer transition-colors ${
                            selectedRateNames.includes(r.name)
                              ? 'border-blue-400 bg-blue-50'
                              : 'border-slate-200 hover:bg-slate-50'
                          }`}>
                            <div className="flex items-center gap-2 min-w-0">
                              <input
                                type="checkbox"
                                checked={selectedRateNames.includes(r.name)}
                                onChange={() => toggleRate(r.name)}
                                className="accent-blue-600 shrink-0"
                              />
                              <span className={`text-xs font-semibold truncate ${
                                r.rate < 0 ? 'text-amber-700' : 'text-blue-700'
                              }`}>{r.name}</span>
                            </div>
                            <span className="text-[11px] font-mono text-slate-500 shrink-0">{r.rate > 0 ? '+' : ''}{r.rate}% &rarr; {r.taxAccount || '—'}</span>
                          </label>
                        ))}
                        {selectedRateNames.length === 0 && (
                          <p className="text-[10px] text-amber-600 pt-1"><i className="fa-solid fa-triangle-exclamation mr-1"></i>No rates selected. Will fall back to default 12% VAT + 2% EWT.</p>
                        )}
                      </div>
                    )}
                  </div>
                  {/* 13th Month Pay Basis */}
                  <div className="border border-slate-200 rounded-lg p-3 space-y-2">
                    <div className="flex items-center justify-between">
                      <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500">
                        <i className="fa-solid fa-calendar-days mr-1"></i>13th Month Pay Basis
                      </p>
                      <div className="flex text-[10px] font-bold rounded-md overflow-hidden border border-slate-300">
                        <button onClick={() => setThirteenthBasis('regular')}
                          className={`px-2.5 py-1 transition-colors ${thirteenthBasis === 'regular' ? 'bg-blue-600 text-white' : 'bg-white text-slate-500 hover:bg-slate-50'}`}>
                          Regular
                        </button>
                        <button onClick={() => setThirteenthBasis('tbs')}
                          className={`px-2.5 py-1 border-l border-slate-300 transition-colors ${thirteenthBasis === 'tbs' ? 'bg-blue-600 text-white' : 'bg-white text-slate-500 hover:bg-slate-50'}`}>
                          Total Basic Salary
                        </button>
                      </div>
                    </div>
                    <p className="text-[10px] text-slate-400">
                      {thirteenthBasis === 'regular'
                        ? 'Formula: Regular \u00f7 12'
                        : 'Formula: Total Basic Salary \u00f7 12 (includes lates deduction)'}
                    </p>
                  </div>

                  {/* Transformation Parameters */}
                  <div className="border border-indigo-200 rounded-lg p-3 space-y-4 bg-indigo-50/40">

    // --- EMAIL DRAFT MODAL ---
    function EmailDraftModal({ txn, client, parentCcEmail = '', onClose }) {
      const [draft, setDraft] = useState("");
      const [isDrafting, setIsDrafting] = useState(true);
      const [copied, setCopied] = useState(false);

      useEffect(() => {
        const fetchDraft = async () => {
          setIsDrafting(true);
          const ccNote = parentCcEmail ? ' This email should note that the parent company has been copied for coordination.' : '';
          const prompt = `Draft a polite, professional, and firm follow-up email to ${client.name} regarding an unpaid invoice. Details: Invoice Ref: ${txn.id}, Amount: ${formatCurrency(txn.total)}, Period: ${txn.period}, Date: ${txn.date}.${ccNote}`;
          const result = await generateTextWithGemini(prompt, "You are a polite financial accountant writing collection emails.");
          setDraft(result);
          setIsDrafting(false);
        };
        fetchDraft();
      }, [txn, client]);

      const handleCopy = () => {
        const ccHeader = parentCcEmail ? `CC: ${parentCcEmail}\n\n` : '';
        fallbackCopyToClipboard(ccHeader + draft);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white w-full max-w-2xl rounded-xl shadow-2xl flex flex-col overflow-hidden">
            <div className="px-6 py-4 bg-purple-700 text-white flex justify-between items-center">
              <div className="flex items-center gap-2"><span className="text-xl">✨</span><h2 className="text-md font-bold">AI Draft: Payment Reminder</h2></div>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center hover:bg-purple-600 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div className="p-6">
              {parentCcEmail && (
                <div className="flex items-center gap-2 mb-3 px-3 py-2 bg-violet-50 border border-violet-200 rounded-md">
                  <i className="fa-solid fa-at text-violet-400 text-xs"></i>
                  <span className="text-xs text-slate-500 font-semibold uppercase tracking-wide">CC:</span>
                  <span className="text-xs text-violet-700 font-medium">{parentCcEmail}</span>
                  <span className="ml-auto text-[9px] bg-violet-100 text-violet-500 px-1.5 py-0.5 rounded font-bold uppercase">auto · parent</span>
                </div>
              )}
              {isDrafting ? (
                <div className="flex flex-col items-center justify-center py-12 text-slate-500 gap-4"><i className="fa-solid fa-spinner fa-spin text-3xl text-purple-600"></i><p className="text-sm font-medium">Gemini is drafting your professional email...</p></div>
              ) : (
                <><p className="text-xs text-slate-500 mb-2 font-medium">Review and copy the draft below:</p><textarea value={draft} onChange={(e) => setDraft(e.target.value)} className="w-full h-64 p-4 border border-slate-200 rounded-lg bg-slate-50 text-slate-800 focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none text-sm"></textarea></>
              )}
            </div>
            <div className="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3">
              <button onClick={onClose} className="px-4 py-2 font-semibold text-slate-600 hover:bg-slate-200 rounded-md transition-colors text-sm">Cancel</button>
              <button onClick={handleCopy} disabled={isDrafting} className="px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-md shadow-sm transition-colors flex items-center gap-2 text-sm disabled:opacity-50">
                {copied ? <><i className="fa-solid fa-check"></i> Copied!</> : <><i className="fa-regular fa-copy"></i> Copy to Clipboard</>}
              </button>
            </div>
          </div>
        </div>
      );
