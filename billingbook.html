<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing Book</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-hidden">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- GEMINI AI PROXY (routes calls through GAS backend — API key never exposed in browser) ---
    const generateTextWithGemini = (prompt, systemPrompt = "You are a professional financial assistant helping a CFO.") => {
      return new Promise((resolve) => {
        if (typeof google === 'undefined') {
          resolve("Not running in GAS environment. Cannot generate content.");
          return;
        }
        google.script.run
          .withSuccessHandler(result => resolve(result))
          .withFailureHandler(err => resolve("Failed to generate content: " + (err.message || 'Unknown error')))
          .callGeminiAI(JSON.stringify({ prompt, systemPrompt }));
      });
    };

    // --- UTILS ---
    const formatCurrency = (amount) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amount);

    const fallbackCopyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.top = "0";
      textArea.style.left = "0";
      textArea.style.position = "fixed";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try { document.execCommand('copy'); } catch (err) { console.error('Fallback: Oops, unable to copy', err); }
      document.body.removeChild(textArea);
    };

    function App() {
      // --- STATE ---
      const [clientsData, setClientsData] = useState([]);
      const [transactionsData, setTransactionsData] = useState([]);
      const [rawUploadsData, setRawUploadsData] = useState([]);
      const [contactsData, setContactsData] = useState([]);
      const [billingCcDefault, setBillingCcDefault] = useState("");
      const [taxGroups, setTaxGroups] = useState([]);
      const [taxRates, setTaxRates] = useState([]);
      const [accountsData, setAccountsData] = useState([]);
      const [isLoading, setIsLoading] = useState(true);

      const [activeClient, setActiveClient] = useState(null);
      const [showAddForm, setShowAddForm] = useState(false);
      const [showNewBookModal, setShowNewBookModal] = useState(false);
      const [showProcessModal, setShowProcessModal] = useState(false);
      const [selectedUpload, setSelectedUpload] = useState(null);
      const [showBriefingModal, setShowBriefingModal] = useState(false);
      const [riskScores, setRiskScores] = useState({});
      const [isLoadingRisk, setIsLoadingRisk] = useState(false);
      const riskScoringDoneRef = useRef(false);
      const [searchTerm, setSearchTerm] = useState('');
      const [computationsData, setComputationsData] = useState([]);
      const [billingDataListData, setBillingDataListData] = useState([]);
      const [parameterTemplates, setParameterTemplates] = useState([]);
      const [billingTransformConfigs, setBillingTransformConfigs] = useState({});
      const [paymentsData, setPaymentsData] = useState([]);
      
      // Track which clients were manually opened in this session to keep them visible on the dashboard temporarily
      const [sessionActiveIds, setSessionActiveIds] = useState(new Set());
      const [expandedParents, setExpandedParents] = useState(new Set());

      // --- FETCH DATA ON LOAD ---
      useEffect(() => {
        if (typeof google === 'undefined') {
          console.log("Not running in GAS environment. Skipping fetch.");
          setIsLoading(false);
          return;
        }

        google.script.run.withSuccessHandler(response => {
          const data = JSON.parse(response);
          const fetchedTxns = data.transactions || [];
          const fetchedClientsRaw = data.books || [];  // BillingBooks is now the authoritative source
          const fetchedUploads = data.rawUploads || [];
          const fetchedContacts = data.contacts || [];
          const fetchedBillingCc = data.billingCc || "";

          // Process raw contacts into enriched clients
          const enrichedClients = fetchedClientsRaw.map(client => {
            // NORMALIZE ID AND NAME from Central Settings schema
            const clientId = client.ContactID || client.id || '';
            const clientName = client.ContactName || client.name || '';

            // Join to Contacts to get ServiceFee — stored as integer % (e.g. 10) → normalize to decimal (0.10)
            const contactRecord = fetchedContacts.find(c => String(c.ContactID || c.id) === String(client.contactId || clientId));
            const rawFee = contactRecord ? (contactRecord.ServiceFee || contactRecord.serviceFee || '') : (client.serviceFee || '');
            const serviceFee = rawFee !== '' ? (Number(rawFee) > 1 ? Number(rawFee) / 100 : Number(rawFee)) : '';

            const clientTxns = fetchedTxns.filter(t => String(t.clientId) === String(clientId));
            const clientUploads = fetchedUploads.filter(u => String(u.ContactId) === String(client.contactId || clientId));
            
            const billed = clientTxns.reduce((sum, t) => sum + (Number(t.total) || 0), 0);
            const collected = clientTxns.reduce((sum, t) => sum + (Number(t.collected) || 0), 0);
            const statements = clientTxns.length;
            const rawUploadsCount = clientUploads.length;
            
            let lastDate = '-';
            let lastBilling = '-';
            let status = 'No Statements';

            if (statements > 0) {
              const sortedTxns = [...clientTxns].sort((a,b) => new Date(b.date) - new Date(a.date));
              lastDate = sortedTxns[0].date;
              lastBilling = new Date(lastDate).toLocaleString('default', { month: 'short', year: 'numeric' });
              status = (billed > collected) ? 'Active' : 'Collected';
            }
            return { ...client, id: clientId, name: clientName, serviceFee, billed, collected, statements, rawUploadsCount, lastDate, lastBilling, status };
          });

          setTransactionsData(fetchedTxns.sort((a, b) => new Date(b.date) - new Date(a.date)));
          setRawUploadsData(fetchedUploads);
          setComputationsData(data.computations || []);
          setClientsData(enrichedClients);
          setContactsData(fetchedContacts);
          setBillingCcDefault(fetchedBillingCc);
          setTaxGroups(data.taxGroups || []);
          setTaxRates(data.taxRates || []);
          setAccountsData(data.accounts || []);
          setBillingDataListData(data.billingDataList || []);
          setParameterTemplates(data.parameterTemplates || []);
          setBillingTransformConfigs(data.billingTransformConfigs || {});
          setPaymentsData(data.payments || []);
          setIsLoading(false);
        }).getAppData();
      }, []);

      const handleSaveNewBilling = (txnData, calcData) => {
        const clientTxns = transactionsData.filter(t => String(t.clientId) === String(activeClient.id));
        const currentBalance = clientTxns.length > 0 ? clientTxns[0].balance : 0;

        const newTxn = {
          id: txnData.billingNo,
          clientId: activeClient.id,
          date: txnData.date,
          type: 'Billing',
          period: (txnData.periodStart && txnData.periodEnd) ? `${txnData.periodStart} to ${txnData.periodEnd}` : 'Current',
          gross: calcData.gross, vat: calcData.vat, ewt: calcData.ewt, total: calcData.totalIncl,
          collected: 0, balance: currentBalance + calcData.netDue, status: 'Unpaid'
        };

        if (typeof google !== 'undefined') {
          google.script.run.saveNewTransaction(JSON.stringify(newTxn));
        }

        setTransactionsData([newTxn, ...transactionsData]);

        const updatedClients = clientsData.map(c => {
          if (String(c.id) === String(activeClient.id)) {
            return {
              ...c,
              billed: c.billed + calcData.totalIncl,
              statements: c.statements + 1,
              lastDate: newTxn.date,
              lastBilling: new Date(newTxn.date).toLocaleString('default', { month: 'short', year: 'numeric' })
            };
          }
          return c;
        });

        setClientsData(updatedClients);
        setActiveClient(updatedClients.find(c => String(c.id) === String(activeClient.id))); 
        setShowAddForm(false);
      };

      const handleCreateNewBook = (bookData, existingId) => {
        let clientToOpen;

        if (existingId) {
          // Open an existing contact's ledger — register it as a BillingBook
          const contact = contactsData.find(c => String(c.ContactID || c.id) === String(existingId));
          const bookId = `BOOK-${Date.now()}`;
          clientToOpen = {
            id: bookId,
            contactId: existingId,
            name: contact ? (contact.ContactName || contact.name) : existingId,
            tin: contact ? (contact.TIN || contact.tin || '') : '',
            businessStyle: contact ? (contact['Business Style'] || contact.businessStyle || '') : '',
            address: contact ? (contact['Address Line 1'] || contact.address || '') : '',
            primaryEmails: contact ? (contact.Email || contact.primaryEmails || '') : '',
            ccEmails: bookData.ccEmails || '',
            terms: contact ? (contact.Terms || contact.terms || 'Net 30') : 'Net 30',
            serviceFee: contact ? (() => { const f = contact.ServiceFee || contact.serviceFee || ''; return f !== '' ? (Number(f) > 1 ? Number(f) / 100 : Number(f)) : ''; })() : '',
            statements: 0, rawUploadsCount: 0, lastBilling: '-', lastDate: '-', billed: 0, collected: 0, status: 'No Statements'
          };

          if (typeof google !== 'undefined') {
            google.script.run.saveNewBillingBook(JSON.stringify({
              bookId, contactId: existingId, contactName: clientToOpen.name,
              tin: clientToOpen.tin, businessStyle: clientToOpen.businessStyle,
              address: clientToOpen.address, primaryEmails: clientToOpen.primaryEmails,
              ccEmails: clientToOpen.ccEmails, terms: clientToOpen.terms
            }));
          }
        } else {
          // Create a brand-new contact AND register as a BillingBook
          const newContactId = `CNT-${Date.now()}`;
          const bookId = `BOOK-${Date.now() + 1}`;
          clientToOpen = {
            id: bookId,
            contactId: newContactId,
            name: bookData.companyName,
            tin: bookData.tin, businessStyle: bookData.businessStyle, address: bookData.address,
            primaryEmails: bookData.primaryEmails, ccEmails: bookData.ccEmails, terms: bookData.terms,
            statements: 0, rawUploadsCount: 0, lastBilling: '-', lastDate: '-', billed: 0, collected: 0, status: 'No Statements'
          };

          if (typeof google !== 'undefined') {
            google.script.run.saveContact(JSON.stringify({
              id: newContactId, name: clientToOpen.name, tin: clientToOpen.tin,
              businessStyle: clientToOpen.businessStyle, address: clientToOpen.address,
              primaryEmails: clientToOpen.primaryEmails, terms: clientToOpen.terms
            }));
            google.script.run.saveNewBillingBook(JSON.stringify({
              bookId, contactId: newContactId, contactName: clientToOpen.name,
              tin: clientToOpen.tin, businessStyle: clientToOpen.businessStyle,
              address: clientToOpen.address, primaryEmails: clientToOpen.primaryEmails,
              ccEmails: clientToOpen.ccEmails, terms: clientToOpen.terms
            }));
          }
        }

        setClientsData(prev => [clientToOpen, ...prev]);
        setShowNewBookModal(false);
        setActiveClient(clientToOpen);
      };

      const handleRefreshBillingBook = (setIsRefreshing) => {
        if (typeof google === 'undefined') { if (setIsRefreshing) setIsRefreshing(false); return; }
        if (setIsRefreshing) setIsRefreshing(true);
        google.script.run
          .withSuccessHandler(response => {
            const data = JSON.parse(response);
            setRawUploadsData(data.rawUploads || []);
            setBillingDataListData(data.billingDataList || []);
            setComputationsData(data.computations || []);
            setTransactionsData((data.transactions || []).sort((a, b) => new Date(b.date) - new Date(a.date)));
            setPaymentsData(data.payments || []);
            if (setIsRefreshing) setIsRefreshing(false);
          })
          .withFailureHandler(() => { if (setIsRefreshing) setIsRefreshing(false); })
          .getAppData();
      };

      const handlePaymentRecorded = (updatedTxns) => {
        if (!updatedTxns || updatedTxns.length === 0) return;
        const updatedMap = {};
        updatedTxns.forEach(t => { updatedMap[t.id] = t; });
        setTransactionsData(prev => prev.map(t => updatedMap[t.id] ? { ...t, ...updatedMap[t.id] } : t));
        // Update clientsData collected
        if (activeClient) {
          setClientsData(prev => prev.map(c => {
            if (String(c.id) !== String(activeClient.id)) return c;
            const newCollected = (transactionsData
              .filter(t => String(t.clientId) === String(activeClient.id))
              .map(t => updatedMap[t.id] ? { ...t, ...updatedMap[t.id] } : t)
              .reduce((s, t) => s + (Number(t.collected) || 0), 0));
            return { ...c, collected: newCollected };
          }));
        }
      };

      const handleTransactionVoided = (txnId) => {
        setTransactionsData(prev => prev.map(t => t.id === txnId ? { ...t, status: 'Voided' } : t));
      };

      const handleTransactionReverted = (txnId) => {
        setTransactionsData(prev => prev.filter(t => t.id !== txnId));
        // Reset any linked computation's BillingStatementId
        setComputationsData(prev => prev.map(c =>
          c.BillingStatementId === txnId ? { ...c, BillingStatementId: '' } : c
        ));
      };

      const handleProcessComplete = (computationRecord) => {
        // Mark the upload as Computed in local state so the action bar state machine advances
        setRawUploadsData(prev => prev.map(u =>
          u.UploadId === computationRecord.UploadId
            ? { ...u, Status: 'Computed', ComputationId: computationRecord.ComputationId, WorksheetUrl: computationRecord.WorksheetUrl || u.WorksheetUrl }
            : u
        ));
        // Prepend new computation so the Billing Computations tab updates immediately
        setComputationsData(prev => [
          { ...computationRecord, ContactId: activeClient?.contactId || activeClient?.id, CreatedAt: new Date().toISOString() },
          ...prev.filter(c => c.ComputationId !== computationRecord.ComputationId)
        ]);
        setShowProcessModal(false);
      };

      // AI Risk Scoring — runs once after clientsData is first populated
      useEffect(() => {
        if (riskScoringDoneRef.current) return;
        const activeClients = clientsData.filter(c => c.statements > 0);
        if (activeClients.length === 0) return;
        riskScoringDoneRef.current = true;
        setIsLoadingRisk(true);
        const summary = activeClients.map(c => ({
          id: c.id, name: c.name, billed: c.billed, collected: c.collected,
          statements: c.statements, terms: c.terms || 'Net 30',
          daysSinceLastBilling: c.lastDate && c.lastDate !== '-'
            ? Math.floor((new Date() - new Date(c.lastDate)) / 86400000) : 999
        }));
        const prompt = `You are a financial risk analyst. Analyze collection risk for each client. Return ONLY a valid JSON object (no markdown, no explanation) where each key is the client "id" and the value is {"level":"Low"|"Medium"|"High","reason":"one short sentence"}. Base your assessment on collected/billed ratio, days since last billing vs payment terms, and statement count.\n\nClients:\n${JSON.stringify(summary)}`;
        generateTextWithGemini(prompt, 'You are a financial risk analyst. Return only valid JSON, no commentary.').then(result => {
          try {
            const cleaned = result.replace(/```json|```/g, '').trim();
            setRiskScores(JSON.parse(cleaned));
          } catch (e) { console.warn('Risk score parse failed:', e); }
          setIsLoadingRisk(false);
        });
      }, [clientsData]);

      // BillingBooks sheet is now authoritative — all books are shown
      const dashboardClients = clientsData;

      // 2. Search Filter
      const searchedClients = dashboardClients.filter(client => 
        (client.name || '').toLowerCase().includes((searchTerm || '').toLowerCase())
      );

      // 3. Group by ParentContact hierarchy
      const groupedRows = useMemo(() => {
        const contactMap = {};
        (contactsData || []).forEach(c => {
          contactMap[String(c.ContactID || c.id || '').trim()] = c;
        });
        const childBookIds = new Set();
        const parentNameToChildren = {};
        searchedClients.forEach(book => {
          const cId = String(book.contactId || book.id || '').trim();
          const rec = contactMap[cId];
          const parentName = rec ? String(rec.ParentContact || '').trim() : '';
          if (parentName) {
            childBookIds.add(book.id);
            if (!parentNameToChildren[parentName]) parentNameToChildren[parentName] = [];
            parentNameToChildren[parentName].push(book);
          }
        });
        const rows = [];
        const processedIds = new Set();
        searchedClients.forEach(book => {
          if (childBookIds.has(book.id)) return;
          const bookName = String(book.name || '').trim();
          const children = parentNameToChildren[bookName] || [];
          if (children.length > 0) {
            const allBooks = [book, ...children];
            const aggBilled     = allBooks.reduce((s, b) => s + (b.billed     || 0), 0);
            const aggCollected  = allBooks.reduce((s, b) => s + (b.collected  || 0), 0);
            const aggStatements = allBooks.reduce((s, b) => s + (b.statements || 0), 0);
            const aggStatus = aggBilled > aggCollected ? 'Active' : aggStatements > 0 ? 'Collected' : 'No Statements';
            rows.push({ type: 'parent', book, children, aggBilled, aggCollected, aggStatements, aggStatus });
          } else {
            rows.push({ type: 'standalone', book });
          }
          processedIds.add(book.id);
        });
        searchedClients.forEach(book => {
          if (!processedIds.has(book.id)) rows.push({ type: 'standalone', book, isOrphanedSub: true });
        });
        return rows;
      }, [searchedClients, contactsData]);

      // KPIs
      const totalOutstandingAR = dashboardClients.reduce((sum, c) => sum + (c.billed - c.collected), 0);

      const now = new Date();
      const overdueAR = transactionsData
        .filter(t => t.status === 'Unpaid' && (now - new Date(t.date)) / 86400000 > 30)
        .reduce((sum, t) => sum + Math.max(0, (Number(t.total) || 0) - (Number(t.collected) || 0)), 0);

      const expectedThisMonth = dashboardClients.reduce((sum, c) => {
        if (c.status !== 'Active' || !c.lastDate || c.lastDate === '-') return sum;
        const termsMatch = (String(c.terms || 'Net 30')).match(/\d+/);
        const termsDays = termsMatch ? parseInt(termsMatch[0]) : 30;
        const dueDate = new Date(new Date(c.lastDate).getTime() + termsDays * 86400000);
        if (dueDate.getMonth() === now.getMonth() && dueDate.getFullYear() === now.getFullYear()) {
          return sum + Math.max(0, c.billed - c.collected);
        }
        return sum;
      }, 0);

      // Compute raw uploads and computations for the active client — match on contactId (not bookId)
      const activeClientContactId = activeClient ? (activeClient.contactId || activeClient.id) : null;
      const activeClientName = activeClient ? String(activeClient.name || '').trim().toLowerCase() : '';
      const activeClientRawUploads = activeClientContactId
        ? rawUploadsData.filter(r =>
            String(r.ContactId) === String(activeClientContactId) ||
            ((!r.ContactId || String(r.ContactId).trim() === '') &&
              String(r.ContactName || '').trim().toLowerCase() === activeClientName)
          )
        : [];
      const activeClientComputations = activeClientContactId
        ? computationsData.filter(c =>
            String(c.ContactId) === String(activeClientContactId) ||
            String(c.ContactId) === String(activeClient.id) ||
            ((!c.ContactId || String(c.ContactId).trim() === '') &&
              String(c.ContactName || '').trim().toLowerCase() === activeClientName)
          )
        : [];

      if (isLoading) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-50">
            <div className="flex flex-col items-center gap-4 text-slate-500">
              <i className="fa-solid fa-spinner fa-spin text-4xl text-blue-600"></i>
              <p className="font-semibold tracking-wide">Syncing with Cloud Database...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen overflow-hidden">
          
          <div className="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50">
            <header className="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center z-10">
              <h1 className="text-2xl font-bold text-slate-800">BILLING BOOK</h1>
              <div className="flex items-center gap-3">
                <button onClick={() => setShowBriefingModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-md font-medium text-sm flex items-center gap-2 transition-colors shadow-sm">
                  <span>✨</span> CFO Briefing
                </button>
                <button onClick={() => setShowNewBookModal(true)} className="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-md font-medium text-sm flex items-center gap-2 transition-colors shadow-sm">
                  <i className="fa-solid fa-plus"></i> New Billing Book
                </button>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-8">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <KpiCard title="Total Outstanding AR" amount={formatCurrency(totalOutstandingAR)} subtitle={`Across ${dashboardClients.length} active ledgers`} icon="fa-solid fa-peso-sign text-blue-600" color="bg-blue-50" />
                <KpiCard title="Overdue (> 30 Days)" amount={formatCurrency(overdueAR)} subtitle="Requires immediate action" icon="fa-solid fa-circle-exclamation text-red-600" color="bg-red-50" alert />
                <KpiCard title="Expected This Month" amount={formatCurrency(expectedThisMonth)} subtitle="Based on current billing cycles" icon="fa-solid fa-arrow-trend-up text-emerald-600" color="bg-emerald-50" />
              </div>

              <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="px-6 py-4 border-b border-slate-200 flex flex-col md:flex-row md:justify-between md:items-center bg-slate-50/50 gap-4">
                  <h2 className="text-sm font-bold text-slate-700 uppercase tracking-wider">Active Client Ledgers</h2>
                  <div className="flex gap-2">
                    <div className="relative">
                      <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                      <input type="text" placeholder="Search active client..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="pl-9 pr-4 py-1.5 text-sm border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-full md:w-64" />
                    </div>
                    <button className="p-1.5 px-3 border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50"><i className="fa-solid fa-filter"></i></button>
                  </div>
                </div>
                
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                      <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                        <th className="px-6 py-4 font-semibold">Client</th>
                        <th className="px-6 py-4 font-semibold">Statements</th>
                        <th className="px-6 py-4 font-semibold">Last Billing</th>
                        <th className="px-6 py-4 font-semibold text-right">Total Billed</th>
                        <th className="px-6 py-4 font-semibold w-48">Collection Progress</th>
                        <th className="px-6 py-4 font-semibold text-right">Balance</th>
                        <th className="px-6 py-4 font-semibold text-center">Status</th>
                        <th className="px-6 py-4 font-semibold text-center">AI Risk</th>
                        <th className="px-6 py-4 font-semibold text-center">Action</th>
                      </tr>
                    </thead>
                    <tbody className="text-sm">
                      {groupedRows.length === 0 ? (
                        <tr><td colSpan="9" className="px-6 py-12 text-center text-slate-500">{searchTerm ? "No active clients match your search." : "No active billing books found. Click 'New Billing Book' to open one."}</td></tr>
                      ) : (
                        groupedRows.flatMap(row => {
                          if (row.type === 'standalone') {
                            const client = row.book;
                            const progress = client.billed > 0 ? (client.collected / client.billed) * 100 : 0;
                            const badge = row.isOrphanedSub
                              ? <span className="ml-2 text-[10px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded font-bold">SUB</span>

                            return [
                              <tr key={client.id} className="border-b border-slate-100 hover:bg-slate-50/80 transition-colors">

                                <td className="px-6 py-4 text-slate-600">{client.statements}</td>
                                <td className="px-6 py-4 text-slate-600"><div>{client.lastBilling}</div><div className="text-xs text-slate-400">{client.lastDate}</div></td>
                                <td className="px-6 py-4 text-right font-medium">{formatCurrency(client.billed)}</td>
                                <td className="px-6 py-4">
                                  <div className="flex flex-col gap-1">
                                    <div className="flex justify-between text-xs"><span className="text-emerald-600 font-medium">{formatCurrency(client.collected)}</span></div>
                                    <div className="w-full bg-slate-200 rounded-full h-1.5"><div className={`h-1.5 rounded-full ${progress === 100 ? 'bg-emerald-500' : 'bg-blue-500'}`} style={{ width: `${progress}%` }}></div></div>
                                  </div>
                                </td>
                                <td className="px-6 py-4 text-right font-bold text-slate-800">{formatCurrency(client.billed - client.collected)}</td>
                                <td className="px-6 py-4 text-center"><StatusBadge status={client.status} /></td>
                                <td className="px-6 py-4 text-center">
                                  {isLoadingRisk ? (
                                    <i className="fa-solid fa-spinner fa-spin text-slate-400 text-xs"></i>
                                  ) : riskScores[client.id] ? (
                                    <RiskBadge level={riskScores[client.id].level} reason={riskScores[client.id].reason} />
                                  ) : <span className="text-slate-300 text-xs">—</span>}
                                </td>
                                <td className="px-6 py-4 text-center">
                                  <button onClick={() => setActiveClient(client)} className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded text-xs font-semibold transition-colors">
                                    <i className="fa-solid fa-book-open text-blue-600"></i> Open Book
                                  </button>
                                </td>
                              </tr>
                            ];
                          }
                          if (row.type === 'parent') {
                            const { book, children, aggBilled, aggCollected, aggStatements, aggStatus } = row;
                            const isExpanded = expandedParents.has(book.id);
                            const aggProgress = aggBilled > 0 ? (aggCollected / aggBilled) * 100 : 0;
                            const toggleExpand = () => setExpandedParents(prev => {
                              const next = new Set(prev);
                              isExpanded ? next.delete(book.id) : next.add(book.id);
                              return next;
                            });
                            const parentRows = [
                              <tr key={book.id} className="border-b border-slate-200 bg-violet-50/40 hover:bg-violet-50 transition-colors cursor-pointer" onClick={toggleExpand}>
                                <td className="px-6 py-4 font-semibold text-slate-800">
                                  <span className="mr-2 text-slate-400 text-xs select-none">{isExpanded ? '▼' : '▶'}</span>
                                  {book.name}
                                  <span className="ml-2 text-[10px] bg-violet-100 text-violet-700 px-1.5 py-0.5 rounded font-bold">PARENT</span>
                                  <span className="ml-1.5 text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">{children.length} sub-contacts</span>
                                </td>
                                <td className="px-6 py-4 text-slate-600">{aggStatements}</td>
                                <td className="px-6 py-4 text-slate-400 text-xs italic">Aggregated</td>
                                <td className="px-6 py-4 text-right font-medium">{formatCurrency(aggBilled)}</td>
                                <td className="px-6 py-4">
                                  <div className="flex flex-col gap-1">
                                    <div className="flex justify-between text-xs"><span className="text-emerald-600 font-medium">{formatCurrency(aggCollected)}</span></div>
                                    <div className="w-full bg-slate-200 rounded-full h-1.5"><div className={`h-1.5 rounded-full ${aggProgress === 100 ? 'bg-emerald-500' : 'bg-violet-500'}`} style={{ width: `${aggProgress}%` }}></div></div>
                                  </div>
                                </td>
                                <td className="px-6 py-4 text-right font-bold text-slate-800">{formatCurrency(aggBilled - aggCollected)}</td>
                                <td className="px-6 py-4 text-center"><StatusBadge status={aggStatus} /></td>
                                <td className="px-6 py-4 text-center">
                                  {isLoadingRisk ? (
                                    <i className="fa-solid fa-spinner fa-spin text-slate-400 text-xs"></i>
                                  ) : riskScores[book.id] ? (
                                    <RiskBadge level={riskScores[book.id].level} reason={riskScores[book.id].reason} />
                                  ) : <span className="text-slate-300 text-xs">—</span>}
                                </td>
                                <td className="px-6 py-4 text-center">
                                  <button onClick={(e) => { e.stopPropagation(); setActiveClient(book); }} className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded text-xs font-semibold transition-colors">
                                    <i className="fa-solid fa-book-open text-violet-600"></i> Open Book
                                  </button>
                                </td>
                              </tr>
                            ];
                            if (isExpanded) {
                              children.forEach(child => {
                                const p = child.billed > 0 ? (child.collected / child.billed) * 100 : 0;
                                parentRows.push(
                                  <tr key={child.id} className="border-b border-slate-100 bg-slate-50/50 hover:bg-white transition-colors">
                                    <td className="pl-12 pr-6 py-3 font-medium text-slate-700">
                                      <span className="text-slate-300 mr-2">└</span>
                                      {child.name}
                                      <span className="ml-2 text-[10px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded font-bold">SUB</span>
                                    </td>
                                    <td className="px-6 py-3 text-slate-600 text-sm">{child.statements}</td>
                                    <td className="px-6 py-3 text-slate-500 text-sm"><div>{child.lastBilling}</div><div className="text-xs text-slate-400">{child.lastDate}</div></td>
                                    <td className="px-6 py-3 text-right text-sm text-slate-600">{formatCurrency(child.billed)}</td>
                                    <td className="px-6 py-3">
                                      <div className="flex flex-col gap-1">
                                        <div className="flex justify-between text-xs"><span className="text-emerald-600 font-medium">{formatCurrency(child.collected)}</span></div>
                                        <div className="w-full bg-slate-200 rounded-full h-1.5"><div className={`h-1.5 rounded-full ${p === 100 ? 'bg-emerald-500' : 'bg-indigo-400'}`} style={{ width: `${p}%` }}></div></div>
                                      </div>
                                    </td>
                                    <td className="px-6 py-3 text-right font-semibold text-sm text-slate-700">{formatCurrency(child.billed - child.collected)}</td>
                                    <td className="px-6 py-3 text-center"><StatusBadge status={child.status} /></td>
                                    <td className="px-6 py-3 text-center"><span className="text-slate-300 text-xs">—</span></td>
                                    <td className="px-6 py-3 text-center">
                                      <button onClick={() => setActiveClient(child)} className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded text-xs font-semibold transition-colors">
                                        <i className="fa-solid fa-book-open text-indigo-600"></i> Open Book
                                      </button>
                                    </td>
                                  </tr>
                                );
                              });
                            }
                            return parentRows;
                          }
                          return [];
                        })
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          {/* MODALS */}
          {activeClient && !showAddForm && !showProcessModal && (
            <ClientDetailsModal 
              client={activeClient} 
              transactions={transactionsData.filter(t => String(t.clientId) === String(activeClient.id))}
              rawUploads={rawUploadsData.filter(r =>
                String(r.ContactId) === String(activeClient.id) ||
                String(r.ContactId) === String(activeClient.contactId) ||
                ((!r.ContactId || String(r.ContactId).trim() === '') &&
                  String(r.ContactName || '').trim().toLowerCase() === String(activeClient.name || '').trim().toLowerCase())
              )}
              computations={activeClientComputations}
              pushEntries={billingDataListData.filter(e => String(e.CompanyName || '').trim().toLowerCase() === String(activeClient.name || '').trim().toLowerCase())}
              onClose={() => setActiveClient(null)} 
              onOpenAdd={() => setShowAddForm(true)}
              onOpenProcess={(upload) => { setSelectedUpload(upload); setShowProcessModal(true); }}
              onRefresh={handleRefreshBillingBook}
              contactsData={contactsData}
              paymentsData={paymentsData}
              accountsData={accountsData}
              onPaymentRecorded={handlePaymentRecorded}
              onTransactionVoided={handleTransactionVoided}
              onTransactionReverted={handleTransactionReverted}
              onTransactionCreated={(result) => {
                if (result.deleted) {
                  // Remove deleted computation from state
                  setComputationsData(prev => prev.filter(c => c.ComputationId !== result.computationId));
                } else {
                  // Mark computation as having a statement + add transaction to local state
                  setComputationsData(prev => prev.map(c =>
                    c.ComputationId === result.computationId ? { ...c, BillingStatementId: result.statementId } : c
                  ));
                  setTransactionsData(prev => [{
                    id: result.statementId,
                    clientId: activeClient.id,
                    bookId: result.bookId,
                    date: new Date().toISOString(),
                    type: 'billing',
                    period: result.period,
                    gross: result.gross,
                    vat: result.vat,
                    ewt: result.ewt,
                    total: result.total,
                    collected: 0,
                    balance: result.total,
                    status: 'Pending'
                  }, ...prev]);
                }
              }}
            />
          )}



          {showAddForm && (
            <AddBillingModal 
              client={activeClient}
              transactions={transactionsData.filter(t => String(t.clientId) === String(activeClient?.id))}
              accounts={accountsData}
              taxRates={taxRates}
              contacts={contactsData}
              onClose={() => setShowAddForm(false)} 
              onSave={handleSaveNewBilling}
            />
          )}

          {showNewBookModal && (
            <NewBillingBookModal 
              onClose={() => setShowNewBookModal(false)} 
              onSave={handleCreateNewBook}
              contacts={contactsData}
              billingCcDefault={billingCcDefault}
            />
          )}

          {showProcessModal && selectedUpload && (
            <ProcessBillingModal
              client={activeClient}
              upload={selectedUpload}
              taxGroups={taxGroups}
              taxRates={taxRates}
              contacts={contactsData}
              parameterTemplates={parameterTemplates}
              transformConfigs={billingTransformConfigs}
              onTemplateAdded={tpl => setParameterTemplates(prev => [...prev, tpl])}
              onTemplateDeleted={key => setParameterTemplates(prev => prev.filter(t => t.key !== key))}
              onClose={() => { setShowProcessModal(false); setSelectedUpload(null); }}
              onComplete={handleProcessComplete}
            />
          )}

          {showBriefingModal && (
            <CfoBriefingModal
              dashboardClients={dashboardClients}
              overdueAR={overdueAR}
              expectedThisMonth={expectedThisMonth}
              totalOutstandingAR={totalOutstandingAR}
              riskScores={riskScores}
              onClose={() => setShowBriefingModal(false)}
            />
          )}
        </div>
      );
    }

    // --- SUB-COMPONENTS ---

    function KpiCard({ title, amount, subtitle, icon, color, alert }) {
      return (
        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
          <div className={`p-3 rounded-lg ${color} w-12 h-12 flex items-center justify-center`}><i className={`${icon} text-xl`}></i></div>
          <div>
            <h3 className="text-sm font-medium text-slate-500 mb-1">{title}</h3>
            <div className={`text-2xl font-bold mb-1 ${alert ? 'text-red-600' : 'text-slate-800'}`}>{amount}</div>
            <p className="text-xs text-slate-400">{subtitle}</p>
          </div>
        </div>
      );
    }

    function StatusBadge({ status }) {
      const styles = {
        'Active': 'bg-blue-100 text-blue-700', 'Collected': 'bg-emerald-100 text-emerald-700',
        'Overdue': 'bg-red-100 text-red-700', 'No Statements': 'bg-slate-100 text-slate-600',
      };
      return <span className={`px-2.5 py-1 rounded-full text-xs font-semibold ${styles[status] || 'bg-slate-100 text-slate-700'}`}>{status}</span>;
    }

    function RiskBadge({ level, reason }) {
      const styles = { 'Low': 'bg-emerald-100 text-emerald-700', 'Medium': 'bg-amber-100 text-amber-700', 'High': 'bg-red-100 text-red-700' };
      const icon = level === 'High' ? '⚠ ' : level === 'Medium' ? '● ' : '✓ ';
      return <span title={reason} className={`px-2.5 py-1 rounded-full text-xs font-semibold cursor-help ${styles[level] || 'bg-slate-100 text-slate-600'}`}>{icon}{level}</span>;
    }

    // --- CLIENT DETAILS MODAL (Phase 2 Action Bar Integration) ---
    function PaginationBar({ total, page, setPage, pageSize, onPageSizeChange }) {
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      return (
        <div className="flex items-center justify-between px-4 py-2.5 border-t border-slate-200 bg-white text-sm text-slate-600 flex-shrink-0">
          <div className="flex items-center gap-2">
            <span className="text-xs text-slate-500">Rows per page:</span>
            <select value={pageSize} onChange={e => onPageSizeChange(Number(e.target.value))} className="border border-slate-200 rounded px-2 py-1 text-xs bg-white focus:outline-none focus:ring-1 focus:ring-blue-300">
              {[10, 20, 50, 100].map(n => <option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div className="flex items-center gap-3 text-xs">
            <span className="text-slate-500">{total === 0 ? '0–0' : (Math.min((page-1)*pageSize+1, total) + '–' + Math.min(page*pageSize, total))} of {total}</span>
            <div className="flex items-center gap-1">
              <button onClick={() => setPage(1)} disabled={page === 1} className="w-7 h-7 flex items-center justify-center rounded border border-slate-200 disabled:opacity-30 hover:bg-slate-50 transition-colors text-xs">«</button>
              <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1} className="w-7 h-7 flex items-center justify-center rounded border border-slate-200 disabled:opacity-30 hover:bg-slate-50 transition-colors text-xs">‹</button>
              <span className="px-2 text-slate-600 font-medium">{page} / {totalPages}</span>
              <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page >= totalPages} className="w-7 h-7 flex items-center justify-center rounded border border-slate-200 disabled:opacity-30 hover:bg-slate-50 transition-colors text-xs">›</button>
              <button onClick={() => setPage(totalPages)} disabled={page >= totalPages} className="w-7 h-7 flex items-center justify-center rounded border border-slate-200 disabled:opacity-30 hover:bg-slate-50 transition-colors text-xs">»</button>
            </div>
          </div>
        </div>
      );
    }

    function ClientDetailsModal({ client, transactions, rawUploads, computations = [], pushEntries = [], onClose, onOpenAdd, onOpenProcess, onRefresh, onTransactionCreated, contactsData = [], paymentsData = [], accountsData = [], onPaymentRecorded, onTransactionVoided, onTransactionReverted }) {
      const [emailDraftTxn, setEmailDraftTxn] = useState(null);
      const [escalationTxn, setEscalationTxn] = useState(null);
      const [clientInsight, setClientInsight] = useState(null);
      const [isLoadingInsight, setIsLoadingInsight] = useState(false);
      const [actionLoadingId, setActionLoadingId] = useState(null);
      const [statementReviewData, setStatementReviewData] = useState(null);
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [openActionMenuId, setOpenActionMenuId] = useState(null);
      const [recordPaymentTxn, setRecordPaymentTxn] = useState(null);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const actionMenuRef = useRef(null);

      // Close action menu on outside click
      useEffect(() => {
        const handleClickOutside = (e) => {
          if (actionMenuRef.current && !actionMenuRef.current.contains(e.target)) {
            setOpenActionMenuId(null);
          }
        };
        if (openActionMenuId) {
          document.addEventListener('mousedown', handleClickOutside);
        }
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, [openActionMenuId]);

      const handleVoidStatement = (txn) => {
        setOpenActionMenuId(null);
        if (!confirm(`Void billing statement ${txn.id}? This will mark it as Voided and cannot be undone.`)) return;
        if (typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler(() => { if (onTransactionVoided) onTransactionVoided(txn.id); })
            .withFailureHandler(err => alert('Failed to void: ' + (err.message || 'Unknown error')))
            .voidBillingStatement(JSON.stringify({ transactionId: txn.id }));
        } else {
          if (onTransactionVoided) onTransactionVoided(txn.id);
        }
      };

      const handleRevertToComputation = (txn) => {
        setOpenActionMenuId(null);
        if (!confirm(`Revert billing statement ${txn.id} back to Billing Computation? The statement and its journal entries will be removed.`)) return;
        if (typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler(() => { if (onTransactionReverted) onTransactionReverted(txn.id); })
            .withFailureHandler(err => alert('Failed to revert: ' + (err.message || 'Unknown error')))
            .revertBillingStatement(JSON.stringify({ transactionId: txn.id }));
        } else {
          if (onTransactionReverted) onTransactionReverted(txn.id);
        }
      };

      const parentCcEmail = useMemo(() => {
        if (!contactsData || !client) return '';
        const cId = String(client.contactId || client.id || '').trim();
        const rec = contactsData.find(c => String(c.ContactID || c.id || '').trim() === cId);
        if (!rec) return '';
        const parentName = String(rec.ParentContact || '').trim();
        if (!parentName) return '';
        const parentContact = contactsData.find(c => String(c.ContactName || c.name || '').trim() === parentName);
        return parentContact ? String(parentContact.primaryEmails || parentContact.Email || '').trim() : '';
      }, [client, contactsData]);

      useEffect(() => {
        if (transactions.length < 3) return;
        setIsLoadingInsight(true);
        const history = transactions.slice(0, 10).map(t => ({
          date: t.date, total: t.total, collected: t.collected, status: t.status
        }));
        const prompt = `Analyze this client's payment history and write a 2-sentence behavioral insight for a CFO. Focus on payment patterns, collection speed, and trends. Client: ${client.name}. History: ${JSON.stringify(history)}`;
        generateTextWithGemini(prompt, 'You are a concise financial analyst writing client payment insights for a CFO. Be direct and factual, max 2 sentences.').then(result => {
          setClientInsight(result);
          setIsLoadingInsight(false);
        });
      }, [client.id]);

      // Workflow State Machine Checking
      const [activeTab, setActiveTab] = useState('transactions');
      const [hrisEntries, setHrisEntries] = useState([]);
      const [hrisLoaded, setHrisLoaded] = useState(false);
      const [hrisLoading, setHrisLoading] = useState(false);
      const [hrisError, setHrisError] = useState('');
      const [checkedHrisIds, setCheckedHrisIds] = useState(new Set());
      const [hrisProcessing, setHrisProcessing] = useState(false);

      const loadHrisData = () => {
        setHrisLoading(true);
        setHrisError('');
        google.script.run
          .withSuccessHandler((res) => {
            setHrisEntries(JSON.parse(res));
            setHrisLoaded(true);
            setHrisLoading(false);
          })
          .withFailureHandler((err) => {
            setHrisError(err.message || 'Failed to load HRIS data.');
            setHrisLoading(false);
          })
          .getHrisRawDataList(client.name);
      };

      const hasRawUpload = rawUploads.some(u => u.Status === 'Raw');
      const canCreateStatement = rawUploads.some(u => u.Status === 'Computed');
      const totalEwt = transactions.reduce((sum, t) => sum + (Number(t.ewt) || 0), 0);

      // Pagination state
      const [pageSize, setPageSize] = useState(10);
      const [txnPage, setTxnPage] = useState(1);
      const [batchPage, setBatchPage] = useState(1);
      const [compPage, setCompPage] = useState(1);
      const [hrisPage, setHrisPage] = useState(1);
      const handlePageSizeChange = (n) => { setPageSize(n); setTxnPage(1); setBatchPage(1); setCompPage(1); setHrisPage(1); };

      // Sorted data for each tab
      const sortedBatches = [
        ...[...rawUploads].map(upload => ({
          _type: 'upload',
          _periodStart: upload.BillingPeriod ? new Date(upload.BillingPeriod.split(' - ')[0]) : new Date(upload.UploadedAt || 0),
          ...upload
        })),
        ...[...pushEntries].map(entry => ({
          _type: 'push',
          _periodStart: entry.CutoffStart ? new Date(entry.CutoffStart) : new Date(entry.PushedAt || 0),
          ...entry
        }))
      ].sort((a, b) => b._periodStart - a._periodStart);

      const sortedComps = [...computations].sort((a, b) => new Date(b.ProcessedAt || 0) - new Date(a.ProcessedAt || 0));
      const sortedHris  = [...hrisEntries].sort((a, b) => new Date(b.CutoffStart || 0) - new Date(a.CutoffStart || 0));

      // Paginated slices
      const txnSlice   = transactions.slice((txnPage-1)*pageSize,   txnPage*pageSize);
      const batchSlice = sortedBatches.slice((batchPage-1)*pageSize, batchPage*pageSize);
      const compSlice  = sortedComps.slice((compPage-1)*pageSize,    compPage*pageSize);
      const hrisSlice  = sortedHris.slice((hrisPage-1)*pageSize,     hrisPage*pageSize);

      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-40 p-4 lg:p-8">
      <div className="bg-white w-full max-w-7xl h-full max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 animate-[fadeIn_0.2s_ease-out]">
            
            <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-blue-100 rounded-lg text-blue-600 w-10 h-10 flex items-center justify-center"><i className="fa-solid fa-book-open text-lg"></i></div>
                <div><h2 className="text-lg font-bold text-slate-800">BILLING BOOK — {client.name}</h2><p className="text-xs text-slate-500">Transaction timeline and ledger</p></div>
              </div>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center hover:bg-slate-200 rounded-full text-slate-500 transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 divide-y md:divide-y-0 md:divide-x divide-slate-100 border-b border-slate-200 bg-white">
              <div className="p-4 text-center"><div className="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-1">Total Billed</div><div className="text-lg font-bold text-slate-800">{formatCurrency(client.billed)}</div></div>
              <div className="p-4 text-center"><div className="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-1">Total Collected</div><div className="text-lg font-bold text-emerald-600">{formatCurrency(client.collected)}</div></div>
              <div className="p-4 text-center"><div className="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-1">Total EWT Withheld</div><div className="text-lg font-bold text-slate-600">{formatCurrency(totalEwt)}</div></div>
              <div className="p-4 text-center bg-red-50/50"><div className="text-xs text-red-500 uppercase tracking-wider font-semibold mb-1">Current Balance</div><div className="text-xl font-black text-red-600">{formatCurrency(client.billed - client.collected)}</div></div>
            </div>

            {/* AI BEHAVIOR INSIGHT BANNER */}
            {transactions.length >= 3 && (

                            setActionLoadingId(null);
                            setStatementReviewData(JSON.parse(res));

                          .withFailureHandler((err) => {
                            setActionLoadingId(null);

                          .prepareBillingStatementReview(JSON.stringify({ computationId: comp.ComputationId }));

                          .withSuccessHandler(() => {
                            setActionLoadingId(null);

                          .withFailureHandler((err) => {
                            setActionLoadingId(null);
