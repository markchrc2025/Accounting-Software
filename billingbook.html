    // --- ADD BILLING MODAL ---
    function AddBillingModal({ client, transactions, accounts, taxRates, contacts, onClose, onSave }) {
      const todayStr = new Date().toISOString().split('T')[0];
      const [billingNo, setBillingNo]       = useState('');
      const [billingDate, setBillingDate]   = useState(todayStr);
      const [periodStart, setPeriodStart]   = useState('');
      const [periodEnd, setPeriodEnd]       = useState('');
      const [terms, setTerms]               = useState('15 days');
      const [isSuggestingNo, setIsSuggestingNo] = useState(false);
      const [lineItems, setLineItems] = useState([
        { id: 1, account: '', description: '', amount: '', vatTaxName: '', ewtTaxName: '' }
      ]);
      const [costItems, setCostItems] = useState([]);

      const incomeAccounts = (accounts || []).filter(a => a.type1 === 'Income');
      const cosAccounts    = (accounts || []).filter(a => a.type1 === 'Cost of Services');
      // VAT options: TaxRates where rate >= 0 and not Purchase (N/A + Sales VAT)
      const vatRateOptions = (taxRates || []).filter(r => r.rate >= 0 && !r.name.toLowerCase().startsWith('purchase'));
      // EWT options: TaxRates where rate <= 0 and not Purchase (N/A + Sales EWT)
      const ewtRateOptions = (taxRates || []).filter(r => r.rate <= 0 && !r.name.toLowerCase().startsWith('purchase'));

      // AR Account from linked Contact record in Central Settings
      const contactRecord = (contacts || []).find(c =>
        String(c.ContactID || c.id || '') === String(client?.contactId || '')
      );
      const arAccount = (contactRecord && (contactRecord['ARAccount'] || contactRecord['AR Account'] || '').trim()) || '';

      // AI: Suggest billing number on mount
      useEffect(() => {
        const lastIds = (transactions || []).slice(0, 3).map(t => t.id).filter(Boolean);
        if (lastIds.length === 0) return;
        setIsSuggestingNo(true);
        const prompt = `Based on these previous billing reference numbers: ${lastIds.join(', ')}. Suggest the next logical billing number for today (${todayStr}). Return ONLY the billing number string, nothing else.`;
        generateTextWithGemini(prompt, 'You are a billing reference number generator. Return ONLY the next billing number string.').then(result => {
          const suggested = result.trim().replace(/[^a-zA-Z0-9\-\/]/g, '');
          if (suggested) setBillingNo(prev => prev || suggested);
          setIsSuggestingNo(false);
        });
      }, []);

      // Revenue line operations
      const addLine      = () => setLineItems(prev => [...prev, { id: Date.now(), account: '', description: '', amount: '', vatTaxName: '', ewtTaxName: '' }]);
      const removeLine   = (id) => setLineItems(prev => prev.length > 1 ? prev.filter(l => l.id !== id) : prev);
      const updateLine   = (id, field, value) => setLineItems(prev => prev.map(l => l.id === id ? { ...l, [field]: value } : l));
      // Cost line operations
      const addCostLine    = () => setCostItems(prev => [...prev, { id: Date.now(), account: '', description: '', amount: '', creditAccount: '' }]);
      const removeCostLine = (id) => setCostItems(prev => prev.filter(l => l.id !== id));
      const updateCostLine = (id, field, value) => setCostItems(prev => prev.map(l => l.id === id ? { ...l, [field]: value } : l));

      // Per-line tax calculation using TaxRates from sheet (rate is stored as percent: 12 = 12%, -2 = 2% EWT)
      const totals = useMemo(() => {
        let grossTotal = 0, vatTotal = 0, ewtTotal = 0;
        lineItems.forEach(row => {
          const amt    = parseFloat(row.amount) || 0;
          grossTotal  += amt;
          const vatObj = (taxRates || []).find(r => r.name === row.vatTaxName);
          if (vatObj && vatObj.rate > 0) vatTotal += Math.round(amt * (vatObj.rate / 100) * 100) / 100;
          const ewtObj = (taxRates || []).find(r => r.name === row.ewtTaxName);
          if (ewtObj && ewtObj.rate < 0) ewtTotal += Math.round(amt * (Math.abs(ewtObj.rate) / 100) * 100) / 100;
        });
        const totalIncl = grossTotal + vatTotal;
        const netDue    = totalIncl - ewtTotal;
        return { grossTotal, vatTotal, ewtTotal, totalIncl, netDue };
      }, [lineItems, taxRates]);

      // Journal Entry — accounts wired from TaxRates.taxAccount + ARAccount from Contacts
      const journalLines = useMemo(() => {
        if (totals.grossTotal <= 0) return [];
        // Build accountName → full label map from all accounts for code resolution
        const acctCodeMap = {};
        (accounts || []).forEach(a => {
          if (!a.accountName) return;
          acctCodeMap[a.accountName] = a.accountCode ? `${a.accountCode} - ${a.accountName}` : a.accountName;
        });
        const resolveAcct = (name) => acctCodeMap[name] || name;
        const lines = [];
        // DR: AR Account (net amount receivable = totalIncl minus EWT)
        const netAR = totals.totalIncl - totals.ewtTotal;
        if (netAR > 0) lines.push({ type: 'DR', account: arAccount, debit: netAR, credit: 0 });
        // DR: EWT — grouped by TaxRates.taxAccount, resolved to full label with code
        const ewtByAcct = {};
        lineItems.forEach(row => {
          const amt    = parseFloat(row.amount) || 0;
          const ewtObj = (taxRates || []).find(r => r.name === row.ewtTaxName);
          if (!ewtObj || ewtObj.rate >= 0 || !ewtObj.taxAccount) return;
          const ewtAmt = Math.round(amt * (Math.abs(ewtObj.rate) / 100) * 100) / 100;
          if (ewtAmt <= 0) return;
          const key = resolveAcct(ewtObj.taxAccount);
          ewtByAcct[key] = (ewtByAcct[key] || 0) + ewtAmt;
        });
        Object.entries(ewtByAcct).forEach(([acct, amt]) =>
          lines.push({ type: 'DR', account: acct, debit: amt, credit: 0 })
        );
        // CR: Income accounts — grouped by account
        const incomeByAcct = {};
        lineItems.forEach(row => {
          const amt = parseFloat(row.amount) || 0;
          if (!row.account || amt <= 0) return;
          incomeByAcct[row.account] = (incomeByAcct[row.account] || 0) + amt;
        });
        Object.entries(incomeByAcct).forEach(([acct, amt]) =>
          lines.push({ type: 'CR', account: acct, debit: 0, credit: amt })
        );
        // CR: Output VAT — grouped by TaxRates.taxAccount, resolved to full label with code
        const vatByAcct = {};
        lineItems.forEach(row => {
          const amt    = parseFloat(row.amount) || 0;
          const vatObj = (taxRates || []).find(r => r.name === row.vatTaxName);
          if (!vatObj || vatObj.rate <= 0 || !vatObj.taxAccount) return;
          const vatAmt = Math.round(amt * (vatObj.rate / 100) * 100) / 100;
          if (vatAmt <= 0) return;
          const key = resolveAcct(vatObj.taxAccount);
          vatByAcct[key] = (vatByAcct[key] || 0) + vatAmt;
        });
        Object.entries(vatByAcct).forEach(([acct, amt]) =>
          lines.push({ type: 'CR', account: acct, debit: 0, credit: amt })
        );
        // COS entries — DR: cost account, CR: user-selected credit account
        costItems.forEach(cost => {
          const amt = parseFloat(cost.amount) || 0;
          if (!cost.account || amt <= 0) return;
          lines.push({ type: 'DR', account: cost.account, debit: amt, credit: 0 });
          if (cost.creditAccount)
            lines.push({ type: 'CR', account: cost.creditAccount, debit: 0, credit: amt });
        });
        return lines;
      }, [lineItems, costItems, totals, taxRates, arAccount, accounts]);

      const jeTotalDebit  = journalLines.reduce((s, l) => s + l.debit,  0);
      const jeTotalCredit = journalLines.reduce((s, l) => s + l.credit, 0);
      const jeBalanced    = journalLines.length > 0 && Math.abs(jeTotalDebit - jeTotalCredit) < 0.01;
      const fmt = (n) => Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      const handleCreate = () => {
        const fd = {
          billingNo, date: billingDate, periodStart, periodEnd, terms,
          description: lineItems.map(l => l.description).filter(Boolean).join('; '),
          grossAmount: String(totals.grossTotal),
          vatRate: lineItems.length === 1 ? ((taxRates || []).find(r => r.name === lineItems[0].vatTaxName)?.rate || 0) / 100 : 0.12,
          ewtRate: totals.grossTotal > 0 ? (totals.ewtTotal / totals.grossTotal) : 0,
          incomeAccount: (lineItems[0] || {}).account || '',
          cosAccount: (costItems[0] || {}).account || '',
          cosAmount: costItems.length > 0 ? String(costItems.reduce((s, c) => s + (parseFloat(c.amount) || 0), 0)) : '',
          arAccount,
          lineItems: JSON.stringify(lineItems),
          costItems: JSON.stringify(costItems),
          journalLines: JSON.stringify(journalLines)
        };
        const calc = { gross: totals.grossTotal, vat: totals.vatTotal, totalIncl: totals.totalIncl, ewt: totals.ewtTotal, netDue: totals.netDue };
        onSave(fd, calc);
      };

      const canCreate = billingNo.trim() && totals.grossTotal > 0 && !!arAccount;

      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-start justify-center z-50 p-4 pt-8 overflow-y-auto">
          <div className="bg-white w-full max-w-6xl rounded-xl shadow-2xl flex flex-col animate-[slideUp_0.3s_ease-out] mb-8">

            {/* ── Header ── */}
            <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-start">
              <div>
                <h2 className="text-base font-bold text-slate-800 uppercase tracking-wide">Create Manual Billing Statement</h2>
                <p className="text-xs text-slate-500 mt-0.5">
                  Client: <span className="font-semibold text-slate-700">{client?.name || 'Unknown'}</span>
                  {arAccount
                    ? <span className="ml-2 text-[10px] text-blue-600 bg-blue-50 border border-blue-200 px-1.5 py-0.5 rounded font-mono">AR: {arAccount}</span>
                    : <span className="ml-2 text-[10px] text-red-600 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded font-semibold"><i className="fa-solid fa-triangle-exclamation mr-1"></i>ARAccount not set on contact</span>
                  }
                </p>
              </div>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center hover:bg-slate-100 rounded-full transition-colors text-slate-400">
                <i className="fa-solid fa-xmark text-lg"></i>
              </button>
            </div>

            {/* ── Top metadata row ── */}
            <div className="px-6 py-4 grid grid-cols-6 gap-4 border-b border-slate-100 bg-slate-50/40">
              <div>
                <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">
                  Billing #{isSuggestingNo && <i className="fa-solid fa-spinner fa-spin text-purple-400 ml-1 text-[9px]"></i>}
                </label>
                <input type="text" value={billingNo} onChange={e => setBillingNo(e.target.value)}
                  placeholder="Auto-suggested"
                  className="w-full px-2.5 py-1.5 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white" />
              </div>
              <div>
                <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Preparation Date</label>
                <input type="date" value={billingDate} onChange={e => setBillingDate(e.target.value)}
                  className="w-full px-2.5 py-1.5 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white" />
              </div>
              <div>
                <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Period Start</label>
                <input type="date" value={periodStart} onChange={e => setPeriodStart(e.target.value)}
                  className="w-full px-2.5 py-1.5 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white" />
              </div>
              <div>
                <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Period End</label>
                <input type="date" value={periodEnd} onChange={e => setPeriodEnd(e.target.value)}
                  className="w-full px-2.5 py-1.5 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white" />
              </div>
              <div>
                <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Terms</label>
                <select value={terms} onChange={e => setTerms(e.target.value)}
                  className="w-full px-2.5 py-1.5 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                  <option>15 days</option>
                  <option>30 days</option>
                  <option>Due on Receipt</option>
                  <option>Net 15</option>
                  <option>Net 30</option>
                </select>
              </div>
              <div>
                <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Status</label>
                <div className="px-2.5 py-1.5 border border-amber-200 rounded-md text-sm bg-amber-50 text-amber-700 font-semibold">Draft</div>
              </div>
            </div>

            {/* ── Billing Line Items ── */}
            <div className="px-6 pt-5 pb-3">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-[11px] font-bold uppercase tracking-wider text-slate-500">Revenue Details</h3>
                <button onClick={addLine} className="text-[11px] font-bold text-blue-600 hover:text-blue-700 flex items-center gap-1 transition-colors">
                  <i className="fa-solid fa-plus text-[10px]"></i> ADD NEW ROW
                </button>
              </div>

              <div className="border border-slate-200 rounded-lg overflow-x-auto">
                <div className="min-w-[940px]">
                  {/* Table header — ACCOUNT | DESCRIPTION | AMOUNT | VAT | EWT | VAT AMT | EWT AMT | × */}
                  <div className="grid bg-slate-50 border-b border-slate-200" style={{gridTemplateColumns: '2.2fr 2.8fr 110px 155px 155px 85px 85px 36px'}}>
                    {['ACCOUNT', 'DESCRIPTION', 'AMOUNT', 'VAT', 'EWT', 'VAT AMT', 'EWT AMT', ''].map((h, i) => (
                      <div key={i} className={`px-3 py-2.5 text-[10px] font-bold uppercase tracking-wider text-slate-500 ${i >= 2 && i <= 6 ? 'text-right' : ''}`}>{h}</div>
                    ))}
                  </div>

                  {/* Revenue line rows */}
                  {lineItems.map((line) => {
                    const amt    = parseFloat(line.amount) || 0;
                    const vatObj = (taxRates || []).find(r => r.name === line.vatTaxName);
                    const ewtObj = (taxRates || []).find(r => r.name === line.ewtTaxName);
                    const vatAmt = vatObj && vatObj.rate > 0 ? Math.round(amt * (vatObj.rate / 100) * 100) / 100 : 0;
                    const ewtAmt = ewtObj && ewtObj.rate < 0 ? Math.round(amt * (Math.abs(ewtObj.rate) / 100) * 100) / 100 : 0;
                    return (
                      <div key={line.id} className="grid border-b border-slate-100 last:border-0 items-center" style={{gridTemplateColumns: '2.2fr 2.8fr 110px 155px 155px 85px 85px 36px'}}>
                        <div className="px-3 py-2">
                          <select value={line.account} onChange={e => updateLine(line.id, 'account', e.target.value)}
                            className="w-full text-sm border border-slate-200 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none bg-white">
                            <option value="">— select account —</option>
                            {incomeAccounts.map(a => {
                              const lbl = a.accountCode ? `${a.accountCode} - ${a.accountName}` : a.accountName;
                              return <option key={lbl} value={lbl}>{lbl}</option>;
                            })}
                          </select>
                        </div>
                        <div className="px-3 py-2">
                          <input type="text" value={line.description} onChange={e => updateLine(line.id, 'description', e.target.value)}
                            placeholder="Description"
                            className="w-full text-sm border border-slate-200 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none" />
                        </div>
                        <div className="px-3 py-2">
                          <input type="number" value={line.amount} onChange={e => updateLine(line.id, 'amount', e.target.value)}
                            placeholder="0.00"
                            className="w-full text-sm border border-slate-200 rounded px-2 py-1.5 text-right focus:ring-2 focus:ring-blue-300 outline-none" />
                        </div>
                        <div className="px-3 py-2">
                          <select value={line.vatTaxName} onChange={e => updateLine(line.id, 'vatTaxName', e.target.value)}
                            className="w-full text-xs border border-slate-200 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none bg-white">
                            <option value="">N/A</option>
                            {vatRateOptions.filter(r => r.rate > 0).map(r => (
                              <option key={r.name} value={r.name}>{r.name} ({r.rate}%)</option>
                            ))}
                          </select>
                        </div>
                        <div className="px-3 py-2">
                          <select value={line.ewtTaxName} onChange={e => updateLine(line.id, 'ewtTaxName', e.target.value)}
                            className="w-full text-xs border border-slate-200 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none bg-white">
                            <option value="">N/A</option>
                            {ewtRateOptions.filter(r => r.rate < 0).map(r => (
                              <option key={r.name} value={r.name}>{r.name} ({Math.abs(r.rate)}%)</option>
                            ))}
                          </select>
                        </div>
                        <div className="px-3 py-2 text-right text-sm font-mono text-slate-600">
                          {vatAmt > 0 ? fmt(vatAmt) : <span className="text-slate-300">—</span>}
                        </div>
                        <div className="px-3 py-2 text-right text-sm font-mono text-red-500">
                          {ewtAmt > 0 ? `-${fmt(ewtAmt)}` : <span className="text-slate-300">—</span>}
                        </div>
                        <div className="flex justify-center items-center">
                          <button onClick={() => removeLine(line.id)} className="w-6 h-6 flex items-center justify-center text-red-400 hover:text-red-600 transition-colors" title="Remove row">
                            <i className="fa-solid fa-xmark"></i>
                          </button>
                        </div>
                      </div>
                    );
                  })}

                  {/* Subtotals row */}
                  <div className="grid bg-slate-50/70 border-t border-slate-200 items-center" style={{gridTemplateColumns: '2.2fr 2.8fr 110px 155px 155px 85px 85px 36px'}}>
                    <div className="px-3 py-2.5 col-span-2 text-xs font-semibold text-slate-500">Subtotals</div>
                    <div className="px-3 py-2.5 text-right text-xs font-mono font-semibold text-slate-700">{fmt(totals.grossTotal)}</div>
                    <div></div><div></div>
                    <div className="px-3 py-2.5 text-right text-xs font-mono font-semibold text-slate-700">{totals.vatTotal > 0 ? fmt(totals.vatTotal) : '—'}</div>
                    <div className="px-3 py-2.5 text-right text-xs font-mono font-semibold text-red-500">{totals.ewtTotal > 0 ? `-${fmt(totals.ewtTotal)}` : '—'}</div>
                    <div></div>
                  </div>

                  {/* Net Amount Due footer */}
                  <div className="bg-slate-800 text-white px-5 py-3 flex items-center justify-between">
                    <span className="text-xs font-bold uppercase tracking-wider text-slate-300">Net Amount Due (Gross + VAT − EWT)</span>
                    <span className="text-xl font-black font-mono text-emerald-400">₱{fmt(totals.netDue)}</span>
                  </div>
                </div>
              </div>
            </div>

            {/* ── Cost Details ── */}
            <div className="px-6 pb-3">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-[11px] font-bold uppercase tracking-wider text-slate-500">Cost Details <span className="font-normal normal-case text-slate-400">(optional)</span></h3>
                <button onClick={addCostLine} className="text-[11px] font-bold text-blue-600 hover:text-blue-700 flex items-center gap-1 transition-colors">
                  <i className="fa-solid fa-plus text-[10px]"></i> ADD COST ROW
                </button>
              </div>
              {costItems.length === 0 ? (
                <div className="border border-dashed border-slate-200 rounded-lg px-4 py-5 text-center text-sm text-slate-400">
                  No cost entries. Click <strong>+ ADD COST ROW</strong> to record cost of services.
                </div>
              ) : (
                <div className="border border-slate-200 rounded-lg overflow-hidden">
                  <div className="border border-slate-200 rounded-lg overflow-x-auto">
                  <div className="min-w-[800px]">
                  <div className="grid bg-slate-50 border-b border-slate-200" style={{gridTemplateColumns: '2.2fr 2.2fr 2fr 120px 36px'}}>
                    {['DR ACCOUNT (Cost)', 'CR ACCOUNT (Payable)', 'DESCRIPTION', 'AMOUNT', ''].map((h, i) => (
                      <div key={i} className={`px-3 py-2.5 text-[10px] font-bold uppercase tracking-wider text-slate-500 ${i === 3 ? 'text-right' : ''}`}>{h}</div>
                    ))}
                  </div>
                  {costItems.map(cost => (
                    <div key={cost.id} className="grid border-b border-slate-100 last:border-0 items-center" style={{gridTemplateColumns: '2.2fr 2.2fr 2fr 120px 36px'}}>
                      <div className="px-3 py-2">
                        <select value={cost.account} onChange={e => updateCostLine(cost.id, 'account', e.target.value)}
                          className="w-full text-sm border border-slate-200 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none bg-white">
                          <option value="">— DR: cost account —</option>
                          {cosAccounts.map(a => {
                            const lbl = a.accountCode ? `${a.accountCode} - ${a.accountName}` : a.accountName;
                            return <option key={lbl} value={lbl}>{lbl}</option>;
                          })}
                        </select>
                      </div>
                      <div className="px-3 py-2">
                        <select value={cost.creditAccount} onChange={e => updateCostLine(cost.id, 'creditAccount', e.target.value)}
                          className="w-full text-sm border border-slate-200 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none bg-white">
                          <option value="">— CR: payable account —</option>
                          {(accounts || []).filter(a => a.accountName).map(a => {
                            const lbl = a.accountCode ? `${a.accountCode} - ${a.accountName}` : a.accountName;
                            return <option key={lbl} value={lbl}>{lbl}</option>;
                          })}
                        </select>
                      </div>
                      <div className="px-3 py-2">
                        <input type="text" value={cost.description} onChange={e => updateCostLine(cost.id, 'description', e.target.value)}
                          placeholder="Description"
                          className="w-full text-sm border border-slate-200 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none" />
                      </div>
                      <div className="px-3 py-2">
                        <input type="number" value={cost.amount} onChange={e => updateCostLine(cost.id, 'amount', e.target.value)}
                          placeholder="0.00"
                          className="w-full text-sm border border-slate-200 rounded px-2 py-1.5 text-right focus:ring-2 focus:ring-blue-300 outline-none" />
                      </div>
                      <div className="flex justify-center items-center">
                        <button onClick={() => removeCostLine(cost.id)} className="w-6 h-6 flex items-center justify-center text-red-400 hover:text-red-600 transition-colors">
                          <i className="fa-solid fa-xmark"></i>
                        </button>
                      </div>
                    </div>
                  ))}
                  </div>
                  </div>
                </div>
              )}
            </div>

            {/* ── Journal Entry (Auto-Generated) ── */}
            <div className="px-6 pb-5">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-[11px] font-bold uppercase tracking-wider text-slate-500">Journal Entry (Auto-Generated)</h3>
                {journalLines.length > 0 && (
                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${jeBalanced ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                    {jeBalanced ? <><i className="fa-solid fa-circle-check mr-1"></i>Balanced</> : <><i className="fa-solid fa-circle-xmark mr-1"></i>Not balanced</>}
                  </span>
                )}
              </div>
              <div className="border border-slate-200 rounded-lg overflow-hidden">
                <div className="grid bg-slate-50 border-b border-slate-200" style={{gridTemplateColumns: '1fr 150px 150px'}}>
                  <div className="px-4 py-2.5 text-[10px] font-bold uppercase tracking-wider text-slate-500">COA (Account Name)</div>
                  <div className="px-4 py-2.5 text-[10px] font-bold uppercase tracking-wider text-slate-500 text-right">Debit</div>
                  <div className="px-4 py-2.5 text-[10px] font-bold uppercase tracking-wider text-slate-500 text-right">Credit</div>
                </div>
                {journalLines.length === 0 && (
                  <div className="px-4 py-6 text-center text-sm text-slate-400">Fill out revenue details to generate journal entry</div>
                )}
                {journalLines.map((line, i) => (
                  <div key={i} className="grid border-b border-slate-100 last:border-0 items-center" style={{gridTemplateColumns: '1fr 150px 150px'}}>
                    <div className={`px-4 py-2.5 text-sm ${line.type === 'CR' ? 'pl-10 text-slate-500' : 'font-medium text-slate-800'}`}>{line.account}</div>
                    <div className="px-4 py-2.5 text-right font-mono text-sm text-slate-700">{line.debit  > 0 ? fmt(line.debit)  : ''}</div>
                    <div className="px-4 py-2.5 text-right font-mono text-sm text-slate-700">{line.credit > 0 ? fmt(line.credit) : ''}</div>
                  </div>
                ))}
                <div className="grid border-t-2 border-slate-300 bg-slate-50 items-center" style={{gridTemplateColumns: '1fr 150px 150px'}}>
                  <div className="px-4 py-2.5"></div>
                  <div className="px-4 py-2 text-right">
                    <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Total Debit</div>
                    <div className="font-mono text-sm font-bold text-slate-800">₱{fmt(jeTotalDebit)}</div>
                  </div>
                  <div className="px-4 py-2 text-right">
                    <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Total Credit</div>
                    <div className="font-mono text-sm font-bold text-slate-800">₱{fmt(jeTotalCredit)}</div>
                  </div>
                </div>
              </div>
            </div>

            {/* ── Footer buttons ── */}
            <div className="px-6 py-4 border-t border-slate-200 flex items-center justify-between bg-slate-50/60 rounded-b-xl">
              <button onClick={onClose} className="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-200 rounded-md transition-colors uppercase tracking-wide">
                Discard Voucher
              </button>
              <button onClick={handleCreate} disabled={!canCreate}
                className={`px-6 py-2 text-white text-sm font-bold rounded-md transition-colors flex items-center gap-2 uppercase tracking-wide ${canCreate ? 'bg-slate-800 hover:bg-slate-900' : 'bg-slate-400 cursor-not-allowed'}`}>
                <i className="fa-solid fa-circle-check"></i> Save to Draft
              </button>
            </div>

          </div>
        </div>
      );
    }

    // --- NEW BILLING BOOK MODAL (Manual Creation Gateway) ---
    function NewBillingBookModal({ onClose, onSave, contacts, billingCcDefault }) {
      const [formData, setFormData] = useState({ companyName: '', tin: '', businessStyle: '', address: '', primaryEmails: '', ccEmails: billingCcDefault || '', terms: 'Net 30 (30 Days)' });
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [selectedExistingId, setSelectedExistingId] = useState(null);
      const [parentInfo, setParentInfo] = useState(null);

      const handleInput = (e) => { 
        const { name, value } = e.target; 
        setFormData(prev => ({ ...prev, [name]: value })); 
        // Unbind the ID if they manually edit the company name after selecting
        if (name === 'companyName') { setSelectedExistingId(null); setParentInfo(null); }
      };

      const handleSelectContact = (matchedContact) => {
        const fullAddress = [matchedContact['Address Line 1'], matchedContact['Address Line 2'], matchedContact['City'], matchedContact['Postal']].filter(Boolean).join(', ');
        let termsVal = 'Net 30 (30 Days)';
        if (matchedContact.Terms) {
          if (matchedContact.Terms.toString().includes('30')) termsVal = 'Net 30 (30 Days)';
          else if (matchedContact.Terms.toString().includes('15')) termsVal = 'Net 15 (15 Days)';
          else termsVal = 'Custom Terms';
        }
        // Resolve parent contact for CC auto-fill
        const parentName = String(matchedContact.ParentContact || '').trim();
        let detectedParent = null;
        let ccBase = billingCcDefault || '';
        if (parentName) {
          const parentContact = (contacts || []).find(c => String(c.ContactName || '').trim() === parentName);
          const parentEmail = parentContact ? String(parentContact.primaryEmails || parentContact.Email || '').trim() : '';
          detectedParent = { name: parentName, email: parentEmail };
          if (parentEmail) {
            const existing = (billingCcDefault || '').split(',').map(e => e.trim()).filter(Boolean);
            if (!existing.includes(parentEmail)) ccBase = [...existing, parentEmail].filter(Boolean).join(', ');
          }
        }
        setFormData({
          companyName: matchedContact.ContactName || '', tin: matchedContact.TIN || '', businessStyle: matchedContact['Business Style'] || '',
          address: fullAddress, primaryEmails: matchedContact.primaryEmails || matchedContact.Email || '', ccEmails: ccBase, terms: termsVal
        });
        setParentInfo(detectedParent);
        setSelectedExistingId(matchedContact.ContactID);
        setShowSuggestions(false);
      };

      const filteredContacts = (contacts || []).filter(c => c.ContactName && c.ContactName.toLowerCase().includes(formData.companyName.toLowerCase()));

      return (
        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
          <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-[slideUp_0.3s_ease-out]">
            <div className="px-6 py-4 bg-slate-800 text-white flex justify-between items-center">
              <div><h2 className="text-lg font-bold">Create New Billing Book</h2><p className="text-xs text-slate-300">Set up a new client ledger</p></div>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center hover:bg-slate-700 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div className="p-6 overflow-y-auto max-h-[80vh]">
              <div className="space-y-4">
                <div className="relative">
                  <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Client / Company Name</label>
                  <div className="relative">
                    <i className="fa-regular fa-building absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" name="companyName" value={formData.companyName} onChange={(e) => { handleInput(e); setShowSuggestions(true); }} onFocus={() => setShowSuggestions(true)} onBlur={() => setTimeout(() => setShowSuggestions(false), 200)} placeholder="e.g. Acme Corporation or search contacts..." className="w-full pl-9 pr-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all" autoComplete="off" />
                  </div>
                  {showSuggestions && filteredContacts.length > 0 && formData.companyName && (
                    <ul className="absolute z-10 w-full bg-white border border-slate-200 shadow-lg max-h-48 overflow-y-auto rounded-md mt-1">
                      {filteredContacts.map(c => (<li key={c.ContactID} className="px-4 py-2 hover:bg-blue-50 cursor-pointer text-sm font-medium text-slate-700 border-b border-slate-100 last:border-0" onClick={() => handleSelectContact(c)}><div className="flex items-center gap-2 flex-wrap">{c.ContactName}{c.ParentContact && <span className="text-[9px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded font-bold">↳ {c.ParentContact}</span>}</div>{c.TIN && <span className="block text-xs text-slate-400 font-normal mt-0.5">TIN: {c.TIN}</span>}</li>))}
                    </ul>
                  )}
                </div>

                {parentInfo && (
                  <div className="flex items-start gap-2.5 px-3 py-2.5 bg-indigo-50 border border-indigo-200 rounded-md">
                    <i className="fa-solid fa-circle-info text-indigo-400 mt-0.5 text-sm shrink-0"></i>
                    <div className="text-xs text-indigo-800 leading-relaxed">
                      <span className="font-semibold">Sub-contact detected.</span> This contact is under <span className="font-bold">{parentInfo.name}</span>.
                      {parentInfo.email && <span className="text-indigo-600"> Parent email has been auto-added to CC.</span>}
                    </div>
                  </div>
                )}

                <div className="grid grid-cols-2 gap-4">
                  <div><label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">TIN</label><input type="text" name="tin" value={formData.tin} onChange={handleInput} placeholder="000-000-000-000" className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all" /></div>
                  <div><label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Business Style</label><input type="text" name="businessStyle" value={formData.businessStyle} onChange={handleInput} placeholder="e.g. Retail" className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all" /></div>
                </div>
                <div><label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Registered Address</label><textarea name="address" value={formData.address} onChange={handleInput} rows="2" placeholder="Full business address" className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none"></textarea></div>
                <hr className="border-slate-100 my-4" />
                <div className="space-y-4">
                  <div><label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Primary Email(s) (To)</label><input type="text" name="primaryEmails" value={formData.primaryEmails} onChange={handleInput} placeholder="billing1@client.com, billing2@client.com" className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all" /><p className="text-[10px] text-slate-400 mt-1">Separate multiple emails with a comma.</p></div>
                  <div><label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Cc Email(s)</label><input type="text" name="ccEmails" value={formData.ccEmails} onChange={handleInput} placeholder="manager@workscale.com" className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all" /></div>
                </div>
                <div className="bg-blue-50/50 border border-blue-100 p-4 rounded-lg mt-2">
                  <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Default Payment Terms</label>
                  <select name="terms" value={formData.terms} onChange={handleInput} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none bg-white"><option>Net 30 (30 Days)</option><option>Net 15 (15 Days)</option><option>Due on Receipt</option><option>Custom Terms</option></select>
                </div>
              </div>
            </div>
            <div className="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3">
              <button onClick={onClose} className="px-4 py-2 font-semibold text-slate-600 hover:bg-slate-200 rounded-md transition-colors">Cancel</button>
              <button onClick={() => onSave(formData, selectedExistingId)} disabled={!formData.companyName} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-bold rounded-md shadow-sm transition-colors flex items-center gap-2">
                 <i className="fa-solid fa-book"></i> Create Ledger
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- CFO MORNING BRIEFING MODAL ---
    function CfoBriefingModal({ dashboardClients, overdueAR, expectedThisMonth, totalOutstandingAR, riskScores, onClose }) {
      const [brief, setBrief] = useState('');
      const [isBriefing, setIsBriefing] = useState(true);

      useEffect(() => {
        const highRisk = Object.values(riskScores).filter(v => v.level === 'High').length;
        const overdueCount = dashboardClients.filter(c => {
          const days = c.lastDate && c.lastDate !== '-' ? Math.floor((new Date() - new Date(c.lastDate)) / 86400000) : 0;
          const terms = parseInt((String(c.terms || 'Net 30')).match(/\d+/)?.[0] || 30);
          return days > terms && c.billed > c.collected;
        }).length;
        const prompt = `You are a CFO assistant giving a morning AR briefing. Write a concise 3-4 sentence executive summary. Be direct and professional. Key data today: Total Outstanding AR: ₱${totalOutstandingAR.toLocaleString('en-PH', {minimumFractionDigits:2})}, Overdue (>30 days): ₱${overdueAR.toLocaleString('en-PH', {minimumFractionDigits:2})}, Expected collections this month: ₱${expectedThisMonth.toLocaleString('en-PH', {minimumFractionDigits:2})}, Active ledgers: ${dashboardClients.length}, High-risk clients: ${highRisk}, Clients past due: ${overdueCount}. Include the most important action item.`;
        generateTextWithGemini(prompt, 'You are a concise CFO assistant. Write a short actionable morning briefing paragraph. No bullet points.').then(result => {
          setBrief(result);
          setIsBriefing(false);
        });
      }, []);

      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white w-full max-w-xl rounded-2xl shadow-2xl flex flex-col overflow-hidden">
            <div className="px-6 py-4 bg-gradient-to-r from-purple-700 to-purple-600 text-white flex justify-between items-center">
              <div className="flex items-center gap-3">
                <span className="text-2xl">✨</span>
                <div><h2 className="text-lg font-bold">CFO Morning Briefing</h2><p className="text-xs text-purple-200">{new Date().toLocaleDateString('en-PH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p></div>
              </div>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center hover:bg-purple-600 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div className="p-6 space-y-4">
              <div className="grid grid-cols-3 gap-3">
                <div className="bg-blue-50 rounded-lg p-3 text-center"><div className="text-[10px] text-blue-500 font-semibold uppercase mb-1">Outstanding AR</div><div className="font-black text-blue-700 text-sm">{formatCurrency(totalOutstandingAR)}</div></div>
                <div className="bg-red-50 rounded-lg p-3 text-center"><div className="text-[10px] text-red-500 font-semibold uppercase mb-1">Overdue &gt;30d</div><div className="font-black text-red-700 text-sm">{formatCurrency(overdueAR)}</div></div>
                <div className="bg-emerald-50 rounded-lg p-3 text-center"><div className="text-[10px] text-emerald-500 font-semibold uppercase mb-1">Expected / Month</div><div className="font-black text-emerald-700 text-sm">{formatCurrency(expectedThisMonth)}</div></div>
              </div>
              <div className="bg-purple-50 border border-purple-100 rounded-xl p-5 min-h-[100px] flex items-start gap-3">
                <span className="text-purple-400 text-xl mt-0.5">✨</span>
                {isBriefing ? (
                  <p className="text-sm text-purple-600 italic flex items-center gap-2"><i className="fa-solid fa-spinner fa-spin"></i> Gemini is preparing your briefing...</p>
                ) : (
                  <p className="text-sm text-purple-900 leading-relaxed">{brief}</p>
                )}
              </div>
            </div>
            <div className="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end">
              <button onClick={onClose} className="px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-md shadow-sm transition-colors text-sm">Close Briefing</button>
            </div>
          </div>
        </div>
      );
    }

    // --- ESCALATION EMAIL MODAL (60+ days overdue) ---
    function EscalationEmailModal({ txn, client, parentCcEmail = '', onClose }) {
      const [draft, setDraft] = useState('');
      const [isDrafting, setIsDrafting] = useState(true);
      const [copied, setCopied] = useState(false);
      const daysPastDue = Math.floor((new Date() - new Date(txn.date)) / 86400000);

      useEffect(() => {
        const ccNote = parentCcEmail ? ' This letter is also being escalated to the parent company.' : '';
        const prompt = `Draft a firm, formal escalation letter to ${client.name} for a severely overdue invoice. The invoice has been unpaid for ${daysPastDue} days. Invoice Ref: ${txn.id}, Amount Due: ${formatCurrency(txn.total)}, Period: ${txn.period}, Original Date: ${txn.date}. The tone must be professional but firm — this is a final notice before formal collection proceedings. Include a demand for payment within 5 business days.${ccNote}`;
        generateTextWithGemini(prompt, 'You are a senior accountant writing a formal escalation letter for a severely overdue invoice. Use professional and assertive language.').then(result => {
          setDraft(result);
          setIsDrafting(false);
        });
      }, [txn, client]);

      const handleCopy = () => {
        const ccHeader = parentCcEmail ? `CC: ${parentCcEmail}\n\n` : '';
        fallbackCopyToClipboard(ccHeader + draft);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white w-full max-w-2xl rounded-xl shadow-2xl flex flex-col overflow-hidden">
            <div className="px-6 py-4 bg-red-700 text-white flex justify-between items-center">
              <div className="flex items-center gap-2">
                <i className="fa-solid fa-triangle-exclamation text-xl"></i>
                <div><h2 className="text-md font-bold">Escalation Notice — {daysPastDue} Days Overdue</h2><p className="text-xs text-red-200">AI-drafted formal collection letter</p></div>
              </div>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center hover:bg-red-600 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div className="p-6">
              {parentCcEmail && (
                <div className="flex items-center gap-2 mb-3 px-3 py-2 bg-red-50 border border-red-200 rounded-md">
                  <i className="fa-solid fa-at text-red-400 text-xs"></i>
                  <span className="text-xs text-slate-500 font-semibold uppercase tracking-wide">CC:</span>
                  <span className="text-xs text-red-700 font-medium">{parentCcEmail}</span>
                  <span className="ml-auto text-[9px] bg-red-100 text-red-500 px-1.5 py-0.5 rounded font-bold uppercase">auto · parent</span>
                </div>
              )}
              {isDrafting ? (
                <div className="flex flex-col items-center justify-center py-12 text-slate-500 gap-4"><i className="fa-solid fa-spinner fa-spin text-3xl text-red-600"></i><p className="text-sm font-medium">Gemini is drafting your escalation notice...</p></div>
              ) : (
                <><p className="text-xs text-slate-500 mb-2 font-medium">Review and copy the escalation letter below:</p><textarea value={draft} onChange={(e) => setDraft(e.target.value)} className="w-full h-64 p-4 border border-red-200 rounded-lg bg-red-50/20 text-slate-800 focus:outline-none focus:ring-2 focus:ring-red-500 resize-none text-sm"></textarea></>
              )}
            </div>
            <div className="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3">
              <button onClick={onClose} className="px-4 py-2 font-semibold text-slate-600 hover:bg-slate-200 rounded-md transition-colors text-sm">Cancel</button>
              <button onClick={handleCopy} disabled={isDrafting} className="px-6 py-2 bg-red-700 hover:bg-red-800 text-white font-bold rounded-md shadow-sm transition-colors flex items-center gap-2 text-sm disabled:opacity-50">
                {copied ? <><i className="fa-solid fa-check"></i> Copied!</> : <><i className="fa-regular fa-copy"></i> Copy to Clipboard</>}
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</body>
</html>
