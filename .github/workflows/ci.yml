name: ScaleBooks CI

on:
  push:
    paths:
      - "scalebooks/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "scalebooks/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: scalebooks

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scalebooks
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Owner connection — runs migrations + seed (exempt from RLS).
      DATABASE_URL_DIRECT: postgres://postgres:postgres@localhost:5432/scalebooks
      # App-role connection — runs the integration tests (subject to RLS).
      DATABASE_URL: postgres://sentire_books_app:app@localhost:5432/scalebooks

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: scalebooks/pnpm-lock.yaml

      - name: Install
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Apply migrations (as owner)
        run: |
          # Apply every migration in order — new ones are picked up automatically.
          for f in $(ls packages/db/migrations/*.sql | sort); do
            echo "applying $f"
            psql "$DATABASE_URL_DIRECT" -v ON_ERROR_STOP=1 -f "$f"
          done
          # Give the app role a login so the integration tests can connect as it.
          # The role is created (NOLOGIN) by 0001_rls.sql — here we just add a login.
          psql "$DATABASE_URL_DIRECT" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE sentire_books_app WITH LOGIN PASSWORD 'app';"

      - name: Seed (as owner)
        run: pnpm --filter @scalebooks/db seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_DIRECT }}

      - name: Integration tests (as app role — RLS enforced)
        run: pnpm --filter @scalebooks/api test:int
