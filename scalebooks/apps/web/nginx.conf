server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-side routes (/journal, /vouchers, …) and OAuth
    # redirects must resolve to index.html instead of 404-ing on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed asset filenames — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, or deploys won't take effect.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
