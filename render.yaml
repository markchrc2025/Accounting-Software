# Render blueprint for Sentire Books — both the API and the web app.
# Create via Render → "New +" → "Blueprint" pointed at this repo.
services:
  # ── API (Hono) ─────────────────────────────────────────────────────────────
  - type: web
    name: scalebooks-api
    runtime: node
    region: singapore
    plan: starter # avoid the free tier's cold starts for a finance API
    rootDir: scalebooks
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter @scalebooks/api build
    startCommand: pnpm --filter @scalebooks/api start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # DB URL as the RLS-bound sentire_books_app role — set in the dashboard,
      # never commit it.
      - key: DATABASE_URL
        sync: false
      # Authenticize (OIDC) — the API verifies RS256 JWTs against its JWKS.
      - key: AUTH_JWKS_URL
        sync: false # e.g. https://auth.example.com/api/auth/jwks
      - key: AUTH_ISSUER
        sync: false # e.g. https://auth.example.com
      # Browser origins allowed to call the API (comma-separated). Update if the
      # web app URL changes.
      - key: CORS_ORIGIN
        value: https://scalebooks-web.onrender.com,http://localhost:5173

  # ── Web (Vite SPA, static site) ────────────────────────────────────────────
  - type: web
    name: scalebooks-web
    runtime: static
    rootDir: scalebooks
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter @scalebooks/web build
    staticPublishPath: apps/web/dist
    autoDeploy: true
    # SPA fallback so client-side routes (/journal, …) don't 404 on refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Authenticize base URL (baked at build time). The web app and Authenticize
      # should share a root domain so the session cookie flows.
      - key: VITE_AUTH_URL
        sync: false # e.g. https://auth.example.com
      # The API's URL — set after the API service is created.
      - key: VITE_API_BASE_URL
        sync: false
