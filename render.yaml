# Render blueprint for Sentire Books — both the API and the web app.
# Create via Render → "New +" → "Blueprint" pointed at this repo.
services:
  # ── API (Hono) ─────────────────────────────────────────────────────────────
  - type: web
    name: scalebooks-api
    runtime: node
    region: singapore
    plan: starter # avoid the free tier's cold starts for a finance API
    rootDir: scalebooks
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter @scalebooks/api build
    startCommand: pnpm --filter @scalebooks/api start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Supabase transaction-pooler URL as the sentire_books_app role (has the
      # password) — set in the dashboard, never commit it.
      - key: DATABASE_URL
        sync: false
      - key: AUTH_JWKS_URL
        value: https://mqsdymealtdrzmbnvvoc.supabase.co/auth/v1/.well-known/jwks.json
      - key: AUTH_ISSUER
        value: https://mqsdymealtdrzmbnvvoc.supabase.co/auth/v1
      # Browser origins allowed to call the API (comma-separated). Update if the
      # web app URL changes.
      - key: CORS_ORIGIN
        value: https://scalebooks-web.onrender.com,http://localhost:5173

  # ── Web (Vite SPA, static site) ────────────────────────────────────────────
  - type: web
    name: scalebooks-web
    runtime: static
    rootDir: scalebooks
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter @scalebooks/web build
    staticPublishPath: apps/web/dist
    autoDeploy: true
    # SPA fallback so client-side routes (/journal, …) don't 404 on refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://mqsdymealtdrzmbnvvoc.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_roR2UnE41AKs4Qwb8fQuKQ_nHp8EgKD
      # The API's Render URL — set after the API service is created.
      - key: VITE_API_BASE_URL
        sync: false
